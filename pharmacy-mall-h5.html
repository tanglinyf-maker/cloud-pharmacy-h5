<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>购药云商城</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#ecfdf5', 500: '#10b981', 600: '#059669', 700: '#047857' }
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .safe-pb { padding-bottom: env(safe-area-inset-bottom, 0px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased" x-data="mallApp()" x-cloak>
  <div class="mx-auto max-w-md min-h-screen bg-white shadow-xl relative pb-24 safe-pb"
       x-init="setInterval(() => { if (view === 'main' && tab === 'home' && !detailPage) bannerIdx = (bannerIdx + 1) % banners.length }, 3500)">

    <!-- ========== 组合购药：列表页 ========== -->
    <template x-if="view === 'comboList'">
      <div class="fixed inset-0 z-[58] bg-gray-100 flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-white border-b border-slate-100">
          <button type="button" @click="view = 'main'" class="p-2 -ml-1 rounded-xl text-slate-700 text-lg" aria-label="返回">←</button>
          <h1 class="font-bold text-lg text-slate-900 flex-1 text-center pr-8">组合购药</h1>
        </header>
        <div class="shrink-0 bg-gradient-to-r from-orange-500 to-amber-500 text-white px-4 py-4">
          <p class="text-base font-bold leading-snug">组合购药理赔限额内 <span class="text-yellow-200">0元</span></p>
          <p class="text-xs opacity-95 mt-1">在线问诊+药品费用直赔+送药到家</p>
        </div>
        <div class="flex-1 overflow-y-auto px-3 py-3 pb-24 safe-pb space-y-3">
          <template x-for="b in comboPurchaseBundles" :key="b.id">
            <div class="bg-white rounded-xl shadow-sm p-3 border border-slate-100/80">
              <div class="flex gap-3">
                <div class="w-24 h-24 shrink-0 rounded-lg bg-slate-100 flex items-center justify-center text-3xl text-slate-400"><i class="ri-image-line"></i></div>
                <div class="flex-1 min-w-0">
                  <p class="font-bold text-slate-900 text-sm" x-text="b.title"></p>
                  <div class="mt-1 space-y-0.5 text-[10px] text-gray-500 leading-relaxed max-h-20 overflow-hidden">
                    <template x-for="(line, li) in b.lines" :key="li">
                      <p class="line-clamp-1" x-text="line"></p>
                    </template>
                  </div>
                  <div class="flex flex-wrap gap-1 mt-2">
                    <template x-for="(tg, ti) in b.tags" :key="ti">
                      <span class="text-[10px] px-2 py-0.5 rounded-full bg-orange-50 text-orange-600" x-text="tg"></span>
                    </template>
                  </div>
                </div>
              </div>
              <div class="flex justify-end mt-3">
                <button type="button" @click="openComboBundleDetail(b, 'list')" class="bg-orange-500 text-white rounded-full px-6 py-2 text-sm font-medium shadow-sm active:opacity-90">去购买</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- ========== 组合购药：单包详情 ========== -->
    <template x-if="view === 'comboDetail' && comboActiveBundle">
      <div class="fixed inset-0 z-[58] bg-gray-100 flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-white border-b border-slate-100">
          <button type="button" @click="closeComboDetail()" class="p-2 -ml-1 rounded-xl text-slate-700 text-lg">←</button>
          <h1 class="font-bold text-lg text-slate-900 flex-1 text-center pr-8">组合购药</h1>
        </header>
        <div class="shrink-0 bg-gradient-to-r from-orange-500 to-amber-500 text-white px-4 py-3">
          <p class="text-sm font-bold">理赔限额内 0元购 · 直赔到家</p>
          <p class="text-[11px] opacity-90 mt-0.5" x-text="comboActiveBundle.title"></p>
        </div>
        <div class="flex-1 overflow-y-auto px-3 py-4 pb-32 safe-pb">
          <div class="bg-white rounded-xl shadow-sm p-4 border border-slate-100">
            <div class="flex gap-3">
              <div class="w-28 h-28 shrink-0 rounded-xl bg-slate-100 flex items-center justify-center text-4xl text-slate-400"><i class="ri-image-line"></i></div>
              <div class="flex-1 min-w-0">
                <p class="font-bold text-slate-900" x-text="comboActiveBundle.title"></p>
                <p class="text-xs text-slate-500 mt-2">本组合包含以下药品（规格与数量以实际处方为准，演示数据）：</p>
              </div>
            </div>
            <ul class="mt-4 space-y-2 text-xs text-gray-600 border-t border-slate-100 pt-3">
              <template x-for="(line, li) in comboActiveBundle.lines" :key="li">
                <li class="flex gap-2"><span class="text-orange-400 shrink-0">·</span><span x-text="line"></span></li>
              </template>
            </ul>
            <div class="flex flex-wrap gap-1.5 mt-4">
              <template x-for="(tg, ti) in comboActiveBundle.tags" :key="ti">
                <span class="text-xs px-2 py-1 rounded-full bg-orange-50 text-orange-600 border border-orange-100" x-text="tg"></span>
              </template>
            </div>
          </div>
          <p class="text-center text-[11px] text-slate-400 mt-4 px-2">以下药品在选购页支持勾选与改量，结算时按权益直赔规则计算（演示）。</p>
        </div>
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 px-4 py-3 safe-pb z-[59] flex gap-3 shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">
          <button type="button" @click="showService = true" class="px-3 py-2 rounded-xl border border-slate-200 text-sm text-slate-600">客服</button>
          <button type="button" @click="openComboSelect()" class="flex-1 py-3 rounded-full bg-orange-500 text-white text-sm font-bold">去购买</button>
        </div>
      </div>
    </template>

    <!-- ========== 组合购药：选购药品（加入购物车） ========== -->
    <template x-if="view === 'comboSelect' && comboActiveBundle">
      <div class="fixed inset-0 z-[58] bg-white flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center justify-between px-3 py-3 border-b border-slate-100 bg-white">
          <button type="button" @click="view = 'comboDetail'" class="p-2 -ml-1 text-slate-600 text-lg" aria-label="关闭">✕</button>
          <h1 class="font-semibold text-base text-slate-900">选购药品</h1>
          <span class="w-9 text-center text-slate-400">⋯</span>
        </header>
        <div class="shrink-0 px-4 py-2 bg-slate-50 border-b border-slate-100 text-xs text-slate-600">
          <p>已选：<span class="text-brand-600 font-medium" x-text="comboActiveBundle.title"></span></p>
          <p class="text-slate-400 mt-1">以下药品均可直接报销（演示）</p>
        </div>
        <div class="flex-1 overflow-y-auto pb-40">
          <template x-for="row in comboSelectItems" :key="row.id">
            <div class="flex items-stretch gap-2 px-3 py-3 border-b border-slate-50">
              <label class="flex items-center pt-1 shrink-0 cursor-pointer">
                <input type="checkbox" x-model="row.selected" class="rounded-full border-slate-300 text-teal-500 w-5 h-5 focus:ring-teal-500" />
              </label>
              <div class="w-16 h-16 shrink-0 rounded-lg bg-slate-100 flex items-center justify-center text-2xl text-slate-400"><i class="ri-image-line"></i></div>
              <div class="flex-1 min-w-0 flex flex-col justify-between py-0.5">
                <p class="text-sm font-semibold text-slate-900 line-clamp-2" x-text="row.name"></p>
                <p class="text-xs text-slate-500 mt-0.5" x-text="row.spec"></p>
                <p class="text-sm font-bold text-slate-900 mt-1">
                  <template x-if="drugCardActivated">
                    <span>
                      ¥<span x-text="drugUnitPrice(row).toFixed(2)"></span>
                      <span class="text-[10px] font-semibold text-orange-600 bg-orange-50 border border-orange-100 px-1.5 py-0.5 rounded-md ml-1">权益价</span>
                    </span>
                  </template>
                  <template x-if="!drugCardActivated">
                    <span>¥<span x-text="row.price.toFixed(2)"></span></span>
                  </template>
                </p>
              </div>
              <div class="flex flex-col items-end justify-center shrink-0">
                <template x-if="!row.selected">
                  <button type="button" @click="row.selected = true; row.qty = 1" class="w-8 h-8 rounded-full bg-orange-500 text-white text-lg font-bold leading-none flex items-center justify-center">+</button>
                </template>
                <template x-if="row.selected">
                  <div class="flex items-center gap-2 border border-slate-200 rounded-lg overflow-hidden">
                    <button type="button" @click="row.qty = Math.max(1, row.qty - 1)" class="px-2 py-1 text-slate-600">−</button>
                    <span class="w-6 text-center text-sm" x-text="row.qty"></span>
                    <button type="button" @click="row.qty++" class="px-2 py-1 text-slate-600">+</button>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
        <div class="shrink-0 px-3 py-2 bg-orange-50 border-t border-orange-100 flex items-center gap-2 text-xs text-orange-800">
          <span><i class="ri-fire-line"></i></span>
          <span>再加购 <b>108</b> 元药品，自费支付 <b>0</b> 元（演示进度）</span>
        </div>
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 px-3 py-3 safe-pb z-[59] shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">
          <div class="flex items-center gap-3 mb-2">
            <label class="flex items-center gap-2 text-sm text-slate-700 shrink-0 cursor-pointer">
              <input type="checkbox" :checked="comboSelectAllChecked" @change="toggleComboSelectAll($event.target.checked)" class="rounded border-slate-300 text-teal-500" />
              全选
            </label>
            <div class="flex-1 text-right text-xs">
              <p>已选 <span class="font-semibold text-slate-900" x-text="comboSelectCount"></span> 件，合计 <span class="text-red-600 font-bold">¥<span x-text="comboSelectPayable.toFixed(2)"></span></span></p>
              <p class="text-slate-500 mt-0.5">门诊报销：¥<span class="text-orange-600 font-semibold" x-text="comboSelectReimburse.toFixed(2)"></span> <span class="text-slate-400">明细^</span></p>
            </div>
            <button type="button" @click="comboBuyNow()" :disabled="comboSelectCount === 0" class="shrink-0 rounded-full bg-orange-500 text-white px-4 py-2.5 text-sm font-bold disabled:opacity-40">立即购药</button>
          </div>
        </div>
      </div>
    </template>

    <!-- ========== 二级页面：商品列表（分类） ========== -->
    <template x-if="view === 'categoryList'">
      <div class="fixed inset-0 z-[57] bg-white max-w-md mx-auto left-0 right-0 flex flex-col overflow-hidden">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-white border-b border-slate-100">
          <button type="button" @click="closeCategoryList()" class="p-2 -ml-1 rounded-xl text-slate-700 text-lg" aria-label="返回">←</button>
          <h1 class="font-bold text-lg text-slate-900 flex-1 truncate" x-text="activeCategoryTitle"></h1>
          <button type="button" @click="openSearch()" class="p-2 rounded-xl bg-slate-100 text-slate-600" aria-label="搜索">
            <i class="ri-search-line"></i>
          </button>
        </header>
        <div class="flex-1 overflow-y-auto px-3 py-3 pb-28 safe-pb space-y-3">
          <div class="rounded-2xl bg-slate-50 border border-slate-100 p-3 text-xs text-slate-600 flex items-center justify-between">
            <span>
              <template x-if="drugCardActivated">权益价展示中</template>
              <template x-if="!drugCardActivated">原价展示</template>
            </span>
            <span class="text-slate-400">共 <span class="font-semibold" x-text="categoryDrugs.length"></span> 件</span>
          </div>

          <div class="grid grid-cols-2 gap-2">
            <template x-for="d in categoryDrugs" :key="d.id">
              <div class="rounded-xl border border-slate-100 bg-white overflow-hidden shadow-sm flex flex-col">
                <button type="button" @click="openDrug(d)" class="text-left">
                  <div class="aspect-square bg-slate-100 relative">
                    <img :src="d.thumb" alt="" class="w-full h-full object-cover" />
                    <div class="absolute top-2 left-2 flex items-center gap-1">
                      <template x-if="d.drugKind === 'rx'">
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full bg-red-50 text-red-600 border border-red-100 text-[10px] font-semibold">处方药</span>
                      </template>
                      <template x-if="d.drugKind !== 'rx'">
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100 text-[10px] font-semibold">非处方</span>
                      </template>
                    </div>
                  </div>
                  <div class="p-2 pt-2">
                    <p class="text-[11px] text-slate-700 line-clamp-2 min-h-[2.4rem]" x-text="d.name"></p>
                    <p class="text-red-600 font-bold text-sm mt-2">
                      <template x-if="drugCardActivated">¥<span x-text="drugUnitPrice(d).toFixed(2)"></span></template>
                      <template x-if="!drugCardActivated">¥<span x-text="d.price.toFixed(2)"></span></template>
                    </p>
                    <p class="text-[9px] text-slate-500 mt-0.5" x-show="drugCardActivated">已优惠 ¥<span x-text="drugSavings(d).toFixed(2)"></span></p>
                  </div>
                </button>
                <div class="p-2 pt-0 mt-auto">
                  <button type="button"
                          @click="addToCart(d)"
                          class="w-full py-2 rounded-lg bg-brand-600 text-white text-xs font-semibold">
                      <span x-show="loggedIn">加购</span>
                      <span x-show="!loggedIn">去登录</span>
                  </button>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- ========== 搜索页 ========== -->
    <template x-if="view === 'searchList'">
      <div class="fixed inset-0 z-[58] bg-white max-w-md mx-auto left-0 right-0 flex flex-col overflow-hidden">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-white border-b border-slate-100">
          <button type="button" @click="closeSearch()" class="p-2 -ml-1 rounded-xl text-slate-700 text-lg" aria-label="返回">←</button>
          <div class="flex-1 relative">
            <input type="search"
                   x-model="searchQuery"
                   @keydown.enter="submitSearch()"
                   placeholder="搜索药品"
                   class="w-full rounded-full bg-slate-100 border-0 py-2.5 pl-9 pr-3 text-sm text-slate-700 outline-none" />
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"><i class="ri-search-line"></i></span>
          </div>
          <button type="button" @click="submitSearch()" class="p-2 rounded-xl bg-slate-100 text-slate-600" aria-label="搜索按钮">
            <i class="ri-arrow-right-s-line"></i>
          </button>
        </header>
        <div class="flex-1 overflow-y-auto px-3 py-3 pb-28 safe-pb space-y-3">
          <div class="text-xs text-slate-500">
            搜索结果：<span class="font-semibold text-slate-700" x-text="searchResults.length"></span> 条
          </div>
          <div class="grid grid-cols-2 gap-2">
            <template x-for="d in searchResults" :key="d.id">
              <div class="rounded-xl border border-slate-100 bg-white overflow-hidden shadow-sm flex flex-col">
                <button type="button" @click="openDrug(d)" class="text-left">
                  <div class="aspect-square bg-slate-100 relative">
                    <img :src="d.thumb" alt="" class="w-full h-full object-cover" />
                    <template x-if="d.drugKind === 'rx'">
                      <span class="absolute top-2 left-2 inline-flex items-center px-2 py-0.5 rounded-full bg-red-50 text-red-600 border border-red-100 text-[10px] font-semibold">处方药</span>
                    </template>
                  </div>
                  <div class="p-2 pt-2">
                    <p class="text-[11px] text-slate-700 line-clamp-2 min-h-[2.4rem]" x-text="d.name"></p>
                    <p class="text-red-600 font-bold text-sm mt-2">
                      <template x-if="drugCardActivated">¥<span x-text="drugUnitPrice(d).toFixed(2)"></span></template>
                      <template x-if="!drugCardActivated">¥<span x-text="d.price.toFixed(2)"></span></template>
                    </p>
                  </div>
                </button>
                <div class="p-2 pt-0 mt-auto">
                  <button type="button"
                          @click="addToCart(d)"
                          class="w-full py-2 rounded-lg bg-brand-600 text-white text-xs font-semibold">
                    <span x-show="loggedIn">加购</span>
                    <span x-show="!loggedIn">去登录</span>
                  </button>
                </div>
              </div>
            </template>
          </div>
          <template x-if="searchResults.length === 0">
            <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 text-center text-xs text-slate-500">
              没有找到相关药品（演示）
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- ========== 处方药下单：问诊开方流程（演示） ========== -->
    <template x-if="view === 'rxFlow'">
      <div class="fixed inset-0 z-[59] bg-slate-50 max-w-md mx-auto left-0 right-0 flex flex-col overflow-hidden">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-brand-600 text-white">
          <button type="button" @click="cancelRxFlow()" class="p-2 -ml-1 rounded-xl bg-white/15 text-white text-lg" aria-label="返回">←</button>
          <h1 class="font-bold text-lg flex-1 truncate">问诊开方 · 处方药下单</h1>
          <button type="button" @click="toast('已进入演示流程')" class="p-2 rounded-xl bg-white/15 text-white">
            <i class="ri-more-2-fill"></i>
          </button>
        </header>
        <div class="flex-1 overflow-y-auto px-3 py-4 safe-pb space-y-3">
          <div class="bg-white rounded-2xl border border-slate-100 p-4 text-sm">
            <div class="flex items-center justify-between mb-3">
              <p class="font-semibold text-slate-900">当前步骤：<span class="text-brand-600" x-text="rxFlowStepLabel"></span></p>
              <p class="text-xs text-slate-500">已选 <span class="font-semibold text-slate-700" x-text="rxFlowSelectedCount"></span> 件处方药</p>
            </div>

            <div x-show="rxFlowStep === 1" class="space-y-3">
              <div>
                <label class="text-xs text-slate-500">就诊人姓名</label>
                <input type="text" x-model="rxPatientName" placeholder="请输入姓名" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2 outline-none focus:border-brand-600" />
              </div>
              <div>
                <label class="text-xs text-slate-500">手机号码</label>
                <input type="tel" x-model="rxPatientPhone" placeholder="请输入手机号" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2 outline-none focus:border-brand-600" />
              </div>
              <div class="rounded-xl bg-slate-50 border border-slate-100 p-3 text-xs text-slate-600">
                提示：处方药下单需先完成问诊开方（演示流程，不代表真实医疗）。
              </div>
              <button type="button" @click="beginRxConsult()" class="w-full py-3.5 rounded-2xl bg-brand-600 text-white font-semibold active:opacity-95">
                免费问诊并开方（演示）
              </button>
            </div>

            <div x-show="rxFlowStep === 2" class="space-y-3">
              <div class="rounded-xl bg-white border border-slate-100 p-4 text-sm">
                <p class="font-semibold text-slate-900 mb-2">医生问诊</p>
                <div class="space-y-2 text-xs text-slate-600">
                  <p>医生将基于问诊信息进行处方审核（演示）。</p>
                  <p class="text-[10px] text-slate-500">若你选择“是”，医生立刻开具处方；否则返回购物车继续修改。</p>
                </div>
              </div>
              <div class="flex gap-2">
                <button type="button" @click="cancelRxFlow()" class="flex-1 py-3.5 rounded-2xl bg-white border border-slate-200 text-slate-700 font-semibold active:opacity-95">
                  否
                </button>
                <button type="button" @click="finalizeRxOrder()" class="flex-1 py-3.5 rounded-2xl bg-brand-600 text-white font-semibold active:opacity-95">
                  是
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- ========== 支付方式弹层（仅微信） ========== -->
    <template x-if="view === 'paySheet'">
      <div class="fixed inset-0 z-[70] bg-black/40 flex items-end justify-center max-w-md mx-auto">
        <div class="w-full bg-white rounded-t-3xl p-4 safe-pb">
          <div class="flex items-center justify-between mb-2">
            <p class="font-semibold text-slate-900">选择支付方式</p>
            <button type="button" @click="closePaySheet()" class="p-2 rounded-xl text-slate-500">✕</button>
          </div>
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600">
                  <i class="ri-wechat-pay-line"></i>
                </div>
                <div>
                  <p class="font-semibold text-slate-900">微信支付</p>
                  <p class="text-[10px] text-slate-500">仅示例</p>
                </div>
              </div>

            orderNo,
            createTime,
            status: 'paid',
            amount,
            receiver: this.order.receiver || '收货人（演示）',
            address: this.order.address || '收货地址（演示）',
            shippingText: isRx ? '处方已审核 · 已发货（演示）' : '支付完成 · 正在配货（演示）',
            firstItemName,
            items
          };

          this.orders.unshift(order);

          // 清空已勾选购物车
          this.cartItems = this.cartItems.filter(i => !i.checked);
          this.cartStep = 1;
          this.tab = 'profile';
          this.view = 'main';

          this.rxFlowSelectedItems = [];
          this.rxPatientName = '';
          this.rxPatientPhone = '';
          this.rxFlowStep = 1;

          this.toast(isRx ? '处方药流程已完成，订单已提交（演示）' : '支付成功（演示）');
        },
        completePay() {
          const hasRx = this.selectedItems.some(i => i.drugKind === 'rx');
          if (hasRx) {
            this.rxFlowSelectedItems = JSON.parse(JSON.stringify(this.selectedItems));
            this.rxPatientName = this.order.receiver || '';
            this.rxPatientPhone = this.order.phone || this.loginPhone;
            this.rxFlowStep = 1;
            this.view = 'rxFlow';
            this.toast('含处方药：请先问诊开方（演示）');
            return;
          }
          this.placeOrderFromSelected(false);
        }
      };
    }
  </script>
</body>
</html>
