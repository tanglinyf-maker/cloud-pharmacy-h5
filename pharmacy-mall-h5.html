<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>购药云商城</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#ecfdf5', 500: '#10b981', 600: '#059669', 700: '#047857' }
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .safe-pb { padding-bottom: env(safe-area-inset-bottom, 0px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased" x-data="mallApp()" x-cloak>
  <div class="mx-auto max-w-md min-h-screen bg-white shadow-xl relative pb-24 safe-pb"
       x-init="setInterval(() => { if (view === 'main' && tab === 'home' && !detailPage) bannerIdx = (bannerIdx + 1) % banners.length }, 3500)">

    <!-- ========== 家庭小药箱：列表页 ========== -->
    <template x-if="view === 'comboList'">
      <div class="fixed inset-0 z-[58] bg-gray-100 flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-white border-b border-slate-100">
          <button type="button" @click="view = 'main'" class="p-2 -ml-1 rounded-xl text-slate-700 text-lg" aria-label="返回">←</button>
          <h1 class="font-bold text-lg text-slate-900 flex-1 text-center pr-8">家庭小药箱</h1>
        </header>
        <div class="shrink-0 bg-gradient-to-r from-orange-500 to-amber-500 text-white px-4 py-4">
          <p class="text-base font-bold leading-snug">为您守护全家健康</p>
          <p class="text-xs opacity-95 mt-1">家庭常备、儿童护理、老人关爱 一站配齐（演示）</p>
        </div>
        <div class="flex-1 overflow-y-auto px-3 py-3 pb-28 safe-pb space-y-3">
          <template x-for="b in comboPurchaseBundles" :key="b.id">
            <div class="bg-white rounded-xl shadow-sm p-3 border border-slate-100/80">
              <div class="flex gap-3">
                <div class="w-24 h-24 shrink-0 rounded-lg bg-slate-100 flex items-center justify-center text-3xl text-slate-400"><i class="ri-image-line"></i></div>
                <div class="flex-1 min-w-0">
                  <p class="font-bold text-slate-900 text-sm" x-text="b.title"></p>
                  <div class="mt-1 space-y-0.5 text-[10px] text-gray-500 leading-relaxed max-h-20 overflow-hidden">
                    <template x-for="(line, li) in b.lines" :key="li">
                      <p class="line-clamp-1" x-text="line"></p>
                    </template>
                  </div>
                  <div class="flex flex-wrap gap-1 mt-2">
                    <template x-for="(tg, ti) in b.tags" :key="ti">
                      <span class="text-[10px] px-2 py-0.5 rounded-full bg-orange-50 text-orange-600" x-text="tg"></span>
                    </template>
                  </div>
                </div>
              </div>
              <div class="flex justify-end mt-3">
                <button type="button" @click="openComboBundleDetail(b, 'list')" class="bg-orange-500 text-white rounded-full px-6 py-2 text-sm font-medium shadow-sm active:opacity-90">去购买</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- ========== 家庭小药箱：单包详情 ========== -->
    <template x-if="view === 'comboDetail' && comboActiveBundle">
      <div class="fixed inset-0 z-[58] bg-gray-100 flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-white border-b border-slate-100">
          <button type="button" @click="closeComboDetail()" class="p-2 -ml-1 rounded-xl text-slate-700 text-lg">←</button>
          <h1 class="font-bold text-lg text-slate-900 flex-1 text-center pr-8">家庭小药箱</h1>
        </header>
        <div class="shrink-0 bg-gradient-to-r from-orange-500 to-amber-500 text-white px-4 py-3">
          <p class="text-sm font-bold">为您守护全家健康</p>
          <p class="text-[11px] opacity-90 mt-0.5" x-text="comboActiveBundle.title"></p>
        </div>
        <div class="flex-1 overflow-y-auto px-3 py-4 pb-40 safe-pb">
          <div class="bg-white rounded-xl shadow-sm p-4 border border-slate-100">
            <div class="flex gap-3">
              <div class="w-28 h-28 shrink-0 rounded-xl bg-slate-100 flex items-center justify-center text-4xl text-slate-400"><i class="ri-image-line"></i></div>
              <div class="flex-1 min-w-0">
                <p class="font-bold text-slate-900" x-text="comboActiveBundle.title"></p>
                <p class="text-xs text-slate-500 mt-2">本组合包含以下药品（规格与数量以实际处方为准，演示数据）：</p>
              </div>
            </div>
            <ul class="mt-4 space-y-2 text-xs text-gray-600 border-t border-slate-100 pt-3">
              <template x-for="(line, li) in comboActiveBundle.lines" :key="li">
                <li class="flex gap-2"><span class="text-orange-400 shrink-0">·</span><span x-text="line"></span></li>
              </template>
            </ul>
            <div class="flex flex-wrap gap-1.5 mt-4">
              <template x-for="(tg, ti) in comboActiveBundle.tags" :key="ti">
                <span class="text-xs px-2 py-1 rounded-full bg-orange-50 text-orange-600 border border-orange-100" x-text="tg"></span>
              </template>
            </div>
          </div>
          <p class="text-center text-[11px] text-slate-400 mt-4 px-2">选购页默认包含本组合全部药品，每种 1 件，可直接进入确认订单结算（演示）。</p>
        </div>
        <div class="fixed bottom-14 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 px-4 py-3 safe-pb z-[61] flex gap-3 shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">
          <button type="button" @click="showService = true" class="flex flex-col items-center justify-center w-11 text-[9px] text-slate-600" aria-label="客服">
            <i class="ri-headphone-line text-xl leading-none"></i>
            <span class="mt-0.5">客服</span>
          </button>
          <button type="button" @click="openComboSelect()" class="flex-1 py-3 rounded-full bg-orange-500 text-white text-sm font-bold">去购买</button>
        </div>
      </div>
    </template>

    <!-- ========== 家庭小药箱：选购药品（整包默认含全部，进入确认订单） ========== -->
    <template x-if="view === 'comboSelect' && comboActiveBundle">
      <div class="fixed inset-0 z-[58] bg-white flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center justify-between px-3 py-3 border-b border-slate-100 bg-white">
          <button type="button" @click="view = 'comboDetail'" class="p-2 -ml-1 text-slate-600 text-lg" aria-label="关闭">✕</button>
          <h1 class="font-semibold text-base text-slate-900">选购药品</h1>
          <span class="w-9 text-center text-slate-400">⋯</span>
        </header>
        <div class="shrink-0 px-4 py-2 bg-slate-50 border-b border-slate-100 text-xs text-slate-600">
          <p>已选：<span class="text-brand-600 font-medium" x-text="comboActiveBundle.title"></span></p>
        </div>
        <div class="flex-1 overflow-y-auto pb-28">
          <template x-for="row in comboSelectItems" :key="row.id">
            <div class="flex items-stretch gap-3 px-3 py-3 border-b border-slate-50">
              <div class="w-16 h-16 shrink-0 rounded-lg bg-slate-100 flex items-center justify-center text-2xl text-slate-400"><i class="ri-image-line"></i></div>
              <div class="flex-1 min-w-0 flex flex-col justify-between py-0.5">
                <p class="text-sm font-semibold text-slate-900 line-clamp-2" x-text="row.name"></p>
                <p class="text-xs text-slate-500 mt-0.5" x-text="row.spec"></p>
                <p class="text-sm font-bold text-slate-900 mt-1">
                  <template x-if="drugCardActivated">
                    <span>
                      ¥<span x-text="drugUnitPrice(row).toFixed(2)"></span>
                      <span class="text-[10px] font-semibold text-orange-600 bg-orange-50 border border-orange-100 px-1.5 py-0.5 rounded-md ml-1">权益价</span>
                    </span>
                  </template>
                  <template x-if="!drugCardActivated">
                    <span>¥<span x-text="row.price.toFixed(2)"></span></span>
                  </template>
                </p>
              </div>
              <div class="shrink-0 flex items-center text-xs text-slate-400 tabular-nums">×1</div>
            </div>
          </template>
        </div>
        <div class="fixed bottom-14 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 px-3 py-3 safe-pb z-[61] shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">
          <div class="flex items-center gap-2">
            <button type="button" @click="showService = true" class="flex flex-col items-center text-[10px] text-slate-500 shrink-0 px-1 py-0.5" aria-label="客服">
              <span class="text-lg leading-none"><i class="ri-headphone-line"></i></span>
              <span>客服</span>
            </button>
            <div class="flex-1 text-xs text-right min-w-0">
              <p>已选 <span class="font-semibold text-slate-900" x-text="comboSelectCount"></span> 件，合计 <span class="text-red-600 font-bold">¥<span x-text="comboSelectFooterTotal.toFixed(2)"></span></span></p>
            </div>
            <button type="button" @click="comboBuyNow()" class="shrink-0 rounded-full bg-orange-500 text-white px-4 py-2.5 text-sm font-bold">立即购药</button>
          </div>
        </div>
      </div>
    </template>

    <!-- ========== 搜索页（参考图样式） ========== -->
    <template x-if="view === 'search'">
      <div class="fixed inset-0 z-[58] bg-[#f2f2f2] max-w-md mx-auto left-0 right-0 flex flex-col">
        <header class="bg-gradient-to-r from-indigo-500 to-indigo-600 text-white">
          <div class="h-14 px-3 flex items-center justify-between">
            <button type="button" @click="closeSearch()" class="w-8 h-8 flex items-center justify-center text-2xl text-white/90">
              <i class="ri-arrow-left-s-line"></i>
            </button>
            <h1 class="text-lg font-semibold tracking-wide">搜索</h1>
            <div class="h-8 px-2 rounded-full bg-indigo-700/45 border border-white/20 flex items-center gap-2 text-white/90">
              <i class="ri-more-fill text-sm"></i>
              <i class="ri-focus-3-line text-base"></i>
            </div>
          </div>
        </header>

        <div class="flex-1 overflow-y-auto px-3 py-4 pb-24 space-y-5 safe-pb">
          <div class="flex items-center gap-2">
            <div class="flex-1 rounded-full border-2 border-orange-500 bg-white pl-4 pr-1 py-1 flex items-center gap-2">
              <i class="ri-search-line text-[22px] leading-none text-orange-500"></i>
              <input type="search"
                     x-model="searchKeyword"
                     @keydown.enter="submitSearch()"
                     placeholder="牛奶"
                     class="flex-1 bg-transparent text-lg text-slate-700 placeholder:text-slate-400 outline-none" />
              <button type="button" @click="submitSearch()" class="px-7 py-2 rounded-full bg-orange-500 text-white text-base font-medium">搜索</button>
            </div>
            <button type="button" @click="closeSearch()" class="text-lg text-slate-700">取消</button>
          </div>

          <div>
            <div class="flex items-center justify-between mb-3">
              <div class="text-2xl leading-none font-semibold text-slate-500">搜索历史</div>
              <button type="button" @click="searchHistory = []" class="text-slate-400 text-2xl">
                <i class="ri-delete-bin-7-line"></i>
              </button>
            </div>
            <div class="flex flex-wrap gap-3">
              <template x-for="h in searchHistory" :key="h">
                <button type="button" @click="selectSearchKeyword(h)" class="px-4 py-2 rounded-full bg-[#e5e5e5] text-base text-slate-700" x-text="h"></button>
              </template>
            </div>
          </div>

          <div>
            <div class="text-2xl leading-none font-semibold text-slate-500 mb-3">猜你想搜</div>
            <div class="flex flex-wrap gap-3">
              <template x-for="k in searchSuggests" :key="k">
                <button type="button" @click="selectSearchKeyword(k)" class="px-4 py-2 rounded-full bg-[#f6ede8] text-base text-orange-500" x-text="k"></button>
              </template>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2" x-show="searchHasSearched && searchResults.length">
            <template x-for="d in searchResults" :key="d.id + '-search'">
              <div class="rounded-xl border border-slate-100 bg-white overflow-hidden shadow-sm flex flex-col">
                <button type="button" @click="openDrug(d)" aria-label="查看商品详情" class="aspect-square bg-slate-100 overflow-hidden w-full relative">
                  <template x-if="(d.drugKind || 'otc') !== 'rx'">
                    <img :src="d.thumb" alt="" class="w-full h-full object-cover pointer-events-none" />
                  </template>
                  <template x-if="(d.drugKind || 'otc') === 'rx'">
                    <div class="w-full h-full flex items-center justify-center bg-slate-100 text-slate-400">
                      <i class="ri-capsule-line text-3xl"></i>
                    </div>
                  </template>
                  <div x-show="(d.drugKind || 'otc') === 'rx'" class="absolute inset-0 bg-black/45 flex items-center justify-center px-2 pointer-events-none">
                    <p class="text-[10px] text-white text-center leading-snug font-semibold">处方药<br/>依据法规不展示包装</p>
                  </div>
                </button>
                <div class="p-2 flex-1 flex flex-col">
                  <p class="text-[9px] text-slate-500">
                    <span class="px-1 py-0.5 rounded border" :class="(d.drugKind || 'otc') === 'rx' ? 'border-amber-300 bg-amber-50 text-amber-800' : 'border-slate-200 bg-slate-50 text-slate-600'" x-text="(d.drugKind || 'otc') === 'rx' ? '处方药' : '非处方药'"></span>
                  </p>
                  <button type="button" @click="openDrug(d)" class="text-left w-full mt-1 min-h-[2rem] rounded-md -mx-0.5 px-0.5 py-0.5 text-[10px] text-slate-700 leading-tight hover:text-brand-600 active:bg-slate-50 transition-colors">
                    <span class="line-clamp-2 block" x-text="d.name"></span>
                  </button>
                  <div class="mt-1">
                    <!-- 未登录：原价 + ¥?权益价 -->
                    <div class="leading-tight" x-show="!loggedIn">
                      <p class="text-red-600 font-bold text-sm">¥<span x-text="drugOriginalPrice(d).toFixed(2)"></span><span class="text-[10px] ml-0.5">原价</span></p>
                      <p class="text-red-500 text-xs mt-0.5">¥?<span class="text-[10px] ml-0.5">权益价</span></p>
                    </div>

                    <!-- 登录：原价 +（可抵扣则展示权益卡标志） -->
                    <div class="leading-tight" x-show="loggedIn">
                      <p class="text-red-600 font-bold text-sm">¥<span x-text="drugOriginalPrice(d).toFixed(2)"></span><span class="text-[10px] ml-0.5">原价</span></p>
                      <p class="mt-1" x-show="isEquityDeductible(d)">
                        <span class="inline-flex items-center gap-1 text-[10px] font-semibold text-red-600 border border-red-100 bg-red-50 px-1.5 py-0.5 rounded">权益</span>
                        <span class="text-[10px] text-slate-400 ml-1">可抵扣</span>
                      </p>
                    </div>
                  </div>
                  <button type="button" @click.stop="addToCart(d)" class="mt-2 py-1.5 rounded-full bg-red-500 text-white text-[10px] font-semibold w-full">立即抢购 ></button>
                </div>
              </div>
            </template>
          </div>

          <div x-show="searchHasSearched && !searchResults.length" class="text-center text-xs text-slate-400 py-10">暂无匹配药品</div>
        </div>
      </div>
    </template>

    <!-- ========== 登录页（参考荷叶健康：绿色主色 + 协议） ========== -->
    <template x-if="view === 'login'">
      <div class="fixed inset-0 z-[60] bg-white flex flex-col max-w-md mx-auto left-0 right-0">
        <div class="px-6 pt-14 pb-2">
          <div class="flex justify-center mb-4">

            </div>
          <h1 class="text-center text-xl font-bold text-slate-900">登录</h1>
        </div>

        <div class="px-6 flex-1 flex flex-col">
          <p class="text-center text-xs text-slate-400 my-4">— 手机验证码登录 / 注册 —</p>

          <div class="space-y-4">
            <div>
              <label class="text-xs text-slate-500">手机号</label>
              <input type="tel" maxlength="11" x-model="loginPhone" placeholder="请输入手机号" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3.5 text-base outline-none focus:ring-2 focus:ring-[#07C160]/25 focus:border-[#07C160]" />
            </div>
            <div>
              <label class="text-xs text-slate-500">验证码</label>
              <div class="mt-1 flex gap-2">
                <input type="text" maxlength="6" x-model="loginCode" placeholder="请输入验证码" class="flex-1 rounded-2xl border border-slate-200 px-4 py-3.5 text-base outline-none focus:ring-2 focus:ring-[#07C160]/25 focus:border-[#07C160]" />
                <button type="button" @click="sendCode()" :disabled="codeCountdown > 0" class="shrink-0 px-4 rounded-2xl bg-slate-100 text-[#07C160] font-medium text-sm disabled:opacity-50" x-text="codeCountdown > 0 ? codeCountdown + 's' : '获取验证码'"></button>
              </div>
            </div>
            <p class="text-[11px] text-slate-400">已默认填写演示账号：<span class="text-slate-600">13999998888</span>，验证码 <span class="text-slate-600">123456</span></p>
          </div>

          <button type="button" @click="doLogin()" class="w-full mt-6 py-3.5 rounded-full border-2 border-slate-200 text-slate-800 font-semibold text-base hover:border-[#07C160]/40 hover:text-[#07C160] transition-colors">验证并登录</button>

          <button type="button" @click="skipLoginForNow()" class="w-full mt-4 text-sm text-slate-400 py-2">暂不登录 / 注册</button>

          <div class="flex-1"></div>

          <button type="button" @click="openCardActivatePage()" class="w-full mb-3 py-3 rounded-2xl border border-[#07C160]/30 text-[#07C160] font-medium text-sm">我有药惠通，去激活</button>

          <label class="flex items-start gap-2 pb-8 safe-pb cursor-pointer">
            <input type="checkbox" x-model="loginAgree" class="mt-0.5 rounded border-slate-300 text-[#07C160] focus:ring-[#07C160]" />
            <span class="text-[11px] text-slate-500 leading-relaxed">我已阅读并同意<span class="text-[#07C160]">《用户服务协议》</span>、<span class="text-[#07C160]">《隐私政策》</span>、<span class="text-[#07C160]">《法律声明》</span></span>
          </label>
        </div>
      </div>
    </template>

    <!-- ========== 我的订单：列表页 ========== -->
    <template x-if="view === 'ordersList'">
      <div class="fixed inset-0 z-[56] bg-gray-50 flex flex-col max-w-md mx-auto left-0 right-0">
        <!-- 顶部栏 -->
        <header class="shrink-0 bg-white border-b border-slate-100">
          <div class="h-12 px-3 flex items-center justify-between">
            <button type="button" @click="backToProfile()" class="w-9 h-9 -ml-1 rounded-xl text-slate-700 text-xl flex items-center justify-center" aria-label="关闭">×</button>
            <h1 class="text-base font-semibold text-slate-900">我的订单</h1>
            <button type="button" class="w-9 h-9 -mr-1 rounded-xl text-slate-400 text-xl flex items-center justify-center" aria-label="更多">⋯</button>
          </div>

          <!-- Tab（按图：横向） -->
          <div class="px-3 pb-2">
            <div class="flex items-center justify-between text-[12px] text-slate-600">
              <button type="button" @click="ordersStatus = 'all'" class="flex-1 text-center py-2 font-semibold"
                      :class="ordersStatus === 'all' ? 'text-slate-900' : 'text-slate-500'">全部订单</button>
              <button type="button" @click="ordersStatus = 'pending_payment'" class="flex-1 text-center py-2 font-semibold"
                      :class="ordersStatus === 'pending_payment' ? 'text-slate-900' : 'text-slate-500'">待付款</button>
              <button type="button" @click="ordersStatus = 'paid'" class="flex-1 text-center py-2 font-semibold"
                      :class="ordersStatus === 'paid' ? 'text-slate-900' : 'text-slate-500'">待发货</button>
              <button type="button" @click="ordersStatus = 'waiting_receipt'" class="flex-1 text-center py-2 font-semibold"
                      :class="ordersStatus === 'waiting_receipt' ? 'text-slate-900' : 'text-slate-500'">待收货</button>
              <button type="button" @click="ordersStatus = 'completed'" class="flex-1 text-center py-2 font-semibold"
                      :class="ordersStatus === 'completed' ? 'text-slate-900' : 'text-slate-500'">已完成</button>
            </div>
            <div class="h-[2px] bg-slate-100 mt-1">
              <div class="h-full bg-orange-500 transition-all duration-200"
                   :style="(() => { const map = { all:0, pending_payment:1, paid:2, waiting_receipt:3, completed:4 }; return 'width:20%; transform: translateX(' + ((map[ordersStatus] ?? 0) * 100) + '%)'; })()"></div>
            </div>
          </div>
        </header>

        <!-- 列表 -->
        <div class="flex-1 overflow-y-auto px-3 py-3 pb-24 safe-pb space-y-3">
          <template x-if="filteredOrders.length === 0">
            <div class="bg-white rounded-2xl border border-slate-100 p-4 text-center text-sm text-slate-500">
              暂无该状态订单
            </div>
          </template>
          <template x-for="o in filteredOrders" :key="o.id">
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden" @click="openOrderDetail(o.id)">
              <!-- 头部：订单号 + 状态 -->
              <div class="px-4 pt-4 flex items-center justify-between gap-2">
                <p class="text-[12px] text-slate-500">
                  订单号：<span class="text-slate-600" x-text="o.orderNo"></span>
                </p>
                <div class="text-[12px] font-semibold" :class="orderStatusPill(o.status).txt === '待支付' ? 'text-orange-500' : 'text-slate-500'" x-text="orderStatusPill(o.status).txt"></div>
              </div>

              <!-- 商品行（取第一件展示，右侧金额/数量） -->
              <div class="px-4 py-4 flex items-start gap-3">
                <div class="w-16 h-16 rounded-xl bg-slate-100 overflow-hidden shrink-0 flex items-center justify-center relative">
                  <template x-if="(o.items && o.items[0] && (o.items[0].drugKind || 'otc') === 'rx')">
                    <div class="w-full h-full flex items-center justify-center bg-slate-100 text-slate-400">
                      <i class="ri-capsule-line text-2xl"></i>
                    </div>
                  </template>
                  <template x-if="!(o.items && o.items[0] && (o.items[0].drugKind || 'otc') === 'rx')">
                    <img :src="(o.items && o.items[0] && o.items[0].thumb) ? o.items[0].thumb : './thumbnails/cold-ganma.png'" alt="" class="w-full h-full object-cover" />
                  </template>
                  <div x-show="(o.items && o.items[0] && (o.items[0].drugKind || 'otc') === 'rx')" class="absolute inset-0 bg-black/45 flex items-center justify-center px-1 pointer-events-none">
                    <p class="text-[7px] text-white text-center leading-tight font-medium">处方药<br/>依据法规不展示包装</p>
                  </div>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-[12px] text-slate-900 font-medium line-clamp-2" x-text="o.firstItemName"></p>
                  <p class="text-[11px] text-slate-400 mt-1 line-clamp-1" x-text="(o.items && o.items[0] && o.items[0].spec) ? o.items[0].spec : ''"></p>
                </div>
                <div class="shrink-0 text-right">
                  <p class="text-[12px] text-slate-900 font-semibold">¥<span x-text="o.amount.toFixed(2)"></span></p>
                  <p class="text-[11px] text-slate-400 mt-1">x<span x-text="(o.items && o.items[0] && o.items[0].qty) ? o.items[0].qty : 1"></span></p>
                </div>
              </div>

              <!-- 按钮区 -->
              <div class="px-4 pb-4 flex justify-end gap-2 border-t border-slate-100 pt-3" @click.stop>
                <button type="button"
                        x-show="o.status === 'pending_payment'"
                        @click="cancelPendingOrderToClosed(o.id)"
                        class="px-4 py-2 rounded-full border border-slate-200 text-[12px] text-slate-600">
                  取消订单
                </button>
                <button type="button"
                        x-show="o.status === 'pending_payment'"
                        @click="payOrder(o.id)"
                        class="px-4 py-2 rounded-full bg-orange-500 text-white text-[12px] font-semibold">
                  去付款
                </button>
                <button type="button"
                        x-show="o.status === 'waiting_receipt'"
                        @click="openLogistics(o)"
                        class="px-4 py-2 rounded-full border border-slate-200 text-[12px] text-slate-600">
                  查看物流
                </button>
                <button type="button"
                        x-show="o.status === 'waiting_receipt'"
                        @click="confirmReceipt(o.id)"
                        class="px-4 py-2 rounded-full bg-orange-500 text-white text-[12px] font-semibold">
                  确认收货
                </button>
                <button type="button"
                        x-show="o.status === 'paid'"
                        @click="toast('已提醒并通知商家，24小时内为您发货！')"
                        class="px-4 py-2 rounded-full border border-slate-200 text-[12px] text-slate-600">
                  提醒发货
                </button>
                <button type="button"
                        x-show="o.status === 'completed'"
                        @click="reorderAllFromOrderId(o.id)"
                        class="px-4 py-2 rounded-full border border-slate-200 text-[12px] text-slate-600">
                  再次购买
                </button>
              </div>
            </div>

              <div class="flex-1 relative">
                <input type="search" readonly @click="openSearch()" placeholder="请输入您要搜索的药品名称" class="w-full rounded-full bg-slate-100 border-0 py-2.5 pl-9 pr-3 text-sm text-slate-600 placeholder:text-slate-400 outline-none" />

                <i class="ri-customer-service-2-line text-lg"></i>
              </button>
            </div>
          </header>

          <!-- 药诊卡入口条（上移） -->
          <div class="px-3 mt-3">
            <button type="button" x-show="!(loggedIn && drugCardActivated)" @click="openCardActivatePage()" class="w-full rounded-2xl bg-gradient-to-r from-red-500 to-orange-500 text-white text-left px-4 py-3 shadow-md shadow-orange-200/50 flex items-center justify-between active:opacity-95">
              <div>
                <p class="text-sm font-bold">华润e·药惠通</p>
                <p class="text-[11px] opacity-90 mt-0.5">好药保供｜用药无忧</p>
              </div>
              <span class="text-xs bg-white/20 px-2 py-1 rounded-lg">权益激活</span>
            </button>
          </div>

          <!-- Banner 轮播 -->
          <div class="px-3 mt-3 relative rounded-2xl overflow-hidden aspect-[21/9] bg-slate-200">
            <template x-for="(b, i) in banners" :key="i">
              <div x-show="bannerIdx === i" x-transition.opacity class="absolute inset-0 flex items-center justify-center text-white font-semibold text-sm" :class="b.bg" x-text="b.title"></div>
            </template>
            <div class="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5">
              <template x-for="(_, i) in banners" :key="'d'+i">
                <span class="h-1.5 rounded-full transition-all" :class="bannerIdx === i ? 'w-4 bg-white' : 'w-1.5 bg-white/50'"></span>
              </template>
            </div>
          </div>

          <!-- 快捷入口 8 个 -->
          <div class="px-3 mt-4">
            <div class="grid grid-cols-4 gap-y-3 gap-x-2 text-center text-xs text-slate-700">
              <template x-for="(c, i) in categories8" :key="i">
                <button type="button" class="flex flex-col items-center gap-1 active:opacity-70" @click="onCategoryShortcut(c)">
                  <span class="w-12 h-12 rounded-2xl bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center text-lg shadow-inner text-slate-600"><i :class="c.icon"></i></span>
                  <span x-text="c.name"></span>
                </button>
              </template>
            </div>
          </div>

        <!-- 专区（2行x2列） -->
          <div class="px-3 mt-4">
            <div class="grid grid-cols-2 gap-3">
              <template x-for="topic in topicSections" :key="topic.id">
                <button type="button" @click="openTopicSection(topic)" class="text-left rounded-3xl p-3 border shadow-sm" :class="topic.cardClass">
                  <div class="flex items-center justify-between">
                    <p class="font-bold text-[18px] leading-none" :class="topic.titleClass" x-text="topic.title"></p>
                    <span class="text-xl leading-none" :class="topic.titleClass">›</span>
                  </div>
                  <div class="grid grid-cols-2 gap-2 mt-3">
                    <template x-for="it in topic.items.slice(0,2)" :key="topic.id + '-home-' + it.name">
                      <div>
                        <div class="h-24 rounded-lg overflow-hidden bg-white/70">
                          <img :src="it.thumb" alt="" class="w-full h-full object-cover" />
                        </div>
                      <div class="mt-1 leading-tight">
                        <!-- 未登录：原价 + ¥?权益价（图1） -->
                        <template x-if="!loggedIn">
                          <div>
                            <p class="text-red-600 font-bold text-sm text-center">¥<span x-text="Number(it.originalPrice ?? it.price ?? 0).toFixed(2)"></span><span class="text-[10px] ml-0.5">原价</span></p>
                            <p class="text-red-500 text-[10px] mt-0.5 text-center">¥?<span class="ml-0.5">权益价</span></p>
                          </div>
                        </template>

                        <!-- 登录：原价 +（可抵扣则展示权益卡可抵扣标志）（图2） -->
                        <template x-if="loggedIn">
                          <div>
                            <p class="text-red-600 font-bold text-sm text-center">¥<span x-text="Number(it.originalPrice ?? it.price ?? 0).toFixed(2)"></span><span class="text-[10px] ml-0.5">原价</span></p>
                            <div class="mt-1 flex items-center justify-center gap-1" x-show="isEquityDeductible(topicItemAsDrug(it))">
                              <span class="inline-flex items-center gap-1 text-[10px] font-semibold text-red-600 border border-red-100 bg-red-50 px-1.5 py-0.5 rounded">权益</span>
                              <span class="text-[10px] text-slate-400">可抵扣</span>
                            </div>
                          </div>
                        </template>
                      </div>
                      </div>
                    </template>
                  </div>
                </button>
              </template>
            </div>
          </div>

          <!-- 药品组合包（保留原区域） -->
          <div class="px-3 mt-4">
            <div class="rounded-xl bg-white border border-orange-100 overflow-hidden shadow-sm">
              <div class="bg-gradient-to-b from-orange-50 to-white px-3 pt-3 pb-2 flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <h2 class="text-lg font-bold text-slate-900">家庭小药箱</h2>
                  <span class="text-[10px] font-semibold text-orange-600 bg-orange-100 px-2 py-0.5 rounded-full flex items-center gap-0.5">为您守护全家健康<span class="text-orange-500"><i class="ri-heart-3-fill"></i></span></span>
                </div>
                <button type="button" @click="openComboPurchaseList()" class="text-xs text-brand-600 font-medium">更多</button>
              </div>
              <div class="grid grid-cols-3 gap-2 px-3 pb-4 pt-1">
                <template x-for="b in comboPurchaseHomeRow" :key="b.id">
                  <div class="flex flex-col rounded-lg bg-white border border-slate-100 overflow-hidden shadow-sm">
                    <div class="aspect-square bg-gray-100 flex items-center justify-center text-2xl text-slate-400"><i class="ri-image-line"></i></div>
                    <p class="text-[10px] text-slate-900 font-medium px-1.5 pt-2 line-clamp-2 leading-tight min-h-[2.25rem]" x-text="b.title"></p>
                    <div class="p-1.5 mt-auto">
                      <button type="button" @click="openComboBundleDetail(b, 'home')" class="w-full py-1.5 rounded-full bg-orange-400 hover:bg-orange-500 text-white text-[11px] font-semibold">去购买</button>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- 药品列表瀑布流（两列） -->
          <div class="px-3 mt-4">
            <div class="flex items-center justify-between mb-2">
              <p class="text-sm font-bold text-slate-900">精选好药</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <template x-for="d in recommendDrugs" :key="'wf-' + d.id">
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden relative">
                  <!-- 该入口（精选好药登录态）列表已展示“已补贴+权益价”，详情页强制走折扣购药展示 -->
                  <button type="button" class="block w-full text-left" @click="openDrug(d, { priceMode: 'discount' })">
                    <div class="aspect-[4/3] bg-slate-100 overflow-hidden flex items-center justify-center">
                      <template x-if="d.thumb">
                        <img :src="d.thumb" alt="" class="w-full h-full object-cover" />
                      </template>
                      <template x-if="!d.thumb">
                        <i class="ri-image-line text-3xl text-slate-400"></i>
                      </template>
                    </div>
                    <div class="p-3">
                      <p class="text-[11px] font-semibold text-slate-900 leading-snug line-clamp-2 min-h-[2.6rem]">
                        <span x-text="String(d.name || '').replace(/^【处方药】\\s*/, '')"></span>
                      </p>
                      <div class="mt-2">
                        <!-- 未登录：原价 + ¥?权益价（图1） -->
                        <div x-show="!loggedIn">
                          <p class="text-sm font-bold text-red-600 leading-snug">¥<span x-text="drugOriginalPrice(d).toFixed(2)"></span> 原价</p>
                          <p class="text-[10px] text-red-500 mt-0.5">¥? <span class="ml-0.5">权益价</span></p>
                        </div>

                        <!-- 登录：固定展示权益折扣价（图3：首页-精选好药） -->
                        <div x-show="loggedIn">
                          <p class="text-[10px] text-red-500" x-text="'已补贴' + drugSavedAmount(d).toFixed(1) + '元'"></p>
                          <p class="text-sm font-bold text-red-600 leading-snug">¥<span x-text="drugEquityPrice(d).toFixed(2)"></span><span class="text-[10px] ml-0.5">权益价</span></p>
                        </div>
                      </div>
                    </div>
                  </button>

                  <!-- 右下角加购 -->
                  <button type="button"
                          @click.stop="addToCart(d)"
                          class="absolute right-3 bottom-3 w-9 h-9 rounded-full bg-red-500 text-white flex items-center justify-center shadow-md active:scale-95"
                          aria-label="加入购物车">
                    <i class="ri-add-line text-xl"></i>
                  </button>
                </div>
              </template>
            </div>
          </div>

  <script>
    function mallApp() {
      return {
        view: 'main',
        tab: 'home',
        loggedIn: false,
        userMask: '',
        loginPhone: '13999998888',
        loginCode: '123456',
        loginAgree: true,
        codeCountdown: 0,
        activatePhone: '',
        activateCode: '',
        cardAgree: false,
        /** 药诊卡二级页：本页是否已展示「激活成功」态（每次进入页面从表单开始） */
        cardActivatePageSuccess: false,
        activateSuccessModal: false,
        /** 权益激活表单字段 */
        equityFormCardNo: '',
        equityFormCardPwd: '',
        equityFormHolderName: '',
        equityFormIdType: '',
        equityFormIdNo: '',
        equityFormPhone: '',
        equityFormSmsCode: '',
        equitySmsCountdown: 0,
        equitySmsTimer: null,
        equityActivateFormOpen: true,
        equityIdTypeOptions: ['身份证', '护照', '台胞证', '港澳通行证', '外国人永久居留身份证'],
        bannerIdx: 0,
        bannerTimer: null,
        showService: false,
        todayYMD() {
          const d = new Date();
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, '0');
          const dd = String(d.getDate()).padStart(2, '0');
          return `${y}-${m}-${dd}`;
        },
        parseYMD(s) {
          const str = String(s || '').trim();
          const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(str);
          if (!m) return NaN;
          const t = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]), 0, 0, 0, 0).getTime();
          return isNaN(t) ? NaN : t;
        },
        isEquityExpired(card) {
          if (card && card._forceExpired) return true;
          const end = this.parseYMD(card?.expireAt);
          if (isNaN(end)) return false;
          const today = this.parseYMD(this.todayYMD());
          return !isNaN(today) && end < today;
        },
        get sortedEquityCards() {
          const list = Array.isArray(this.equityCards) ? this.equityCards.slice() : [];
          const active = [];
          const expired = [];
          list.forEach(c => (this.isEquityExpired(c) ? expired : active).push(c));
          // 保障中：快到期（截止更早）排最上：按 expireAt 升序
          active.sort((a, b) => (this.parseYMD(a?.expireAt) || 0) - (this.parseYMD(b?.expireAt) || 0));
          // 已过期：放底部（越近的过期越靠上也可）：按 expireAt 降序
          expired.sort((a, b) => (this.parseYMD(b?.expireAt) || 0) - (this.parseYMD(a?.expireAt) || 0));
          return active.concat(expired);
        },
        toastMsg: '',
        detailPage: '',
        detailEquity: null,
        detailDrug: null,
        detailCombo: null,
        /** 商品详情价格展示模式：auto | discount(到手价/已补贴) | deduct(原价/权益卡可抵扣) */
        detailPriceMode: 'auto',
        pendingAction: '', // 'ordersList' | 'addToCartDrug'
        pendingOrdersStatus: '',
        pendingAddToCartDrug: null,
        cartStep: 1,
        /** 权益卡购药折扣（演示：7折） */
        equityDiscount: 0.7,
        rxCheckoutStep: 1,
        rxPrescriptionComplete: false,
        rxCheckoutReturnView: 'confirmOrder',
        showCartPriceDetail: false,
        remoteConsultStep: 1,
        orderDetailBackTo: 'ordersList',
        showPayMethodSheet: false,
        addressPickerSheet: false,
        orderAddressId: '',
        wxCashierSheet: false,
        wxMerchantName: '江苏中心药房XXX公司',
        wxPayAmount: 0,
        wxPayPwd: '',
        lastCreatedOrderId: '',
        payResultOrderId: '',
        showRxPrescriptionDetail: false,

        openAddToCartSheet(d, mode) {
          // 未登录的药品加购走原有登录拦截
          const m = mode || 'cart';
          if (d && d.type === 'drug' && !this.loggedIn) {
            // 继续沿用原有拦截：未登录先走登录页
            this.addToCart(d);
            return;
          }
          this.addToCartDrug = d ? { ...d } : null;
          this.addToCartQty = 1;
          this.addToCartSheetMode = m;
          this.addToCartSheet = true;
        },
        closeAddToCartSheet() {
          this.addToCartSheet = false;
          this.addToCartDrug = null;
          this.addToCartQty = 1;
          this.addToCartSheetMode = 'cart';
        },
        confirmAddToCartSheet() {
          const d = this.addToCartDrug;
          const qty = Math.max(1, Math.min(99, Number(this.addToCartQty || 1)));
          const mode = this.addToCartSheetMode || 'cart';
          if (!d) { this.closeAddToCartSheet(); return; }

          // 药品：一次性写入 qty（避免循环 addToCart）
          if (d && d.type === 'drug') {
            const conflicts = d.rxConflictWithIds || [];
            for (let j = 0; j < conflicts.length; j++) {
              const oid = conflicts[j];
              const other = this.cartItems.find(i => i.id === oid);
              if (other) {
                this.toast('您加购的「' + d.name + '」与您购物车内「' + other.name + '」不宜同时使用哦~');
                return;
              }
            }
            const basePrice = Number(d.price || 0);
            const unit = this.drugCardActivated ? basePrice * this.equityDiscount : basePrice;
            const saving = this.drugCardActivated ? basePrice * (1 - this.equityDiscount) : 0;
            const ex = this.cartItems.find(i => i.id === d.id);
            if (ex) {
              ex.qty = Number(ex.qty || 0) + qty;
              ex.type = 'drug';
              ex.basePrice = Number(ex.basePrice ?? basePrice);
              ex.price = unit;
              ex.subsidy = saving;
            } else {
              this.cartItems.push({ ...d, type: 'drug', basePrice, qty, checked: true, price: unit, subsidy: saving });
            }
            // buyNow / buyRx：加购后直接进入对应流程
            if (mode === 'buyNow') {
              // 立即购买只结算当前商品，避免购物车内已有处方药导致被引导去问诊页
              this.cartItems.forEach(i => { i.checked = false; });
              const cur = this.cartItems.find(i => i.id === d.id);
              if (cur) cur.checked = true;
              this.closeAddToCartSheet();
              this.closeDetail();
              this.tab = 'cart';
              this.cartStep = 2;
              this.syncOrderWithDefaultAddress();
              return;
            }
            if (mode === 'buyRx') {
              // 开方购买只结算当前商品
              this.cartItems.forEach(i => { i.checked = false; });
              const cur = this.cartItems.find(i => i.id === d.id);
              if (cur) cur.checked = true;
              this.closeAddToCartSheet();
              this.closeDetail();
              this.rxPrescriptionComplete = false;
              this.rxCheckoutStep = 1;
              this.rxAgreementChecked = true;
              this.view = 'rxCheckout';
              return;
            }

            this.toast('已加入购物车');
            this.closeAddToCartSheet();
            return;
          }

          // 非药品（兜底）
          const ex = this.cartItems.find(i => i.id === d.id);
          if (ex) ex.qty = Number(ex.qty || 0) + qty;
          else this.cartItems.push({ ...d, qty, checked: true });
          if (mode === 'buyNow') {
            this.cartItems.forEach(i => { i.checked = false; });
            const cur = this.cartItems.find(i => i.id === d.id);
            if (cur) cur.checked = true;
            this.closeAddToCartSheet();
            this.closeDetail();
            this.tab = 'cart';
            this.cartStep = 2;
            this.syncOrderWithDefaultAddress();
            return;
          }
          if (mode === 'buyRx') {
            this.cartItems.forEach(i => { i.checked = false; });
            const cur = this.cartItems.find(i => i.id === d.id);
            if (cur) cur.checked = true;
            this.closeAddToCartSheet();
            this.closeDetail();
            this.rxPrescriptionComplete = false;
            this.rxCheckoutStep = 1;
            this.rxAgreementChecked = true;
            this.view = 'rxCheckout';
            return;
          }
          this.toast('已加入购物车');
          this.closeAddToCartSheet();
        },

        createOrderAndOpenPay() {

          if (this.selectedHasRx && !this.rxPrescriptionComplete) {

          this.addresses = (this.addresses || []).map(x => ({ ...x, isDefault: x.id === id }));
          this.persistAddresses();
          this.syncOrderWithDefaultAddress();
        },
        deleteAddress(id) {
          const before = (this.addresses || []).slice();
          const removed = before.find(x => x.id === id);
          this.addresses = before.filter(x => x.id !== id);
          if (removed && removed.isDefault && this.addresses.length) {
            this.addresses[0].isDefault = true;
          }
          this.persistAddresses();
          this.syncOrderWithDefaultAddress();
          this.toast('已删除');
        },
        saveAddress() {
          const f = this.addressForm || {};
          const name = String(f.name || '').trim();
          const phone = String(f.phone || '').trim();
          const region = String(f.region || '').trim();
          const detail = String(f.detail || '').trim();
          if (!region) { this.toast('请选择收货地址'); return; }
          if (!detail) { this.toast('请填写详细地址'); return; }
          if (!name) { this.toast('请填写联系人'); return; }
          if (!/^1\d{10}$/.test(phone)) { this.toast('请输入正确手机号'); return; }
          const payload = {
            id: this.addressEditId || ('a_' + Date.now()),
            name,
            gender: String(f.gender || ''),
            phone,
            region,
            detail,
            tag: String(f.tag || ''),
            isDefault: !!f.isDefault
          };
          let next = (this.addresses || []).slice();
          if (this.addressEditId) {
            next = next.map(x => (x.id === this.addressEditId ? { ...x, ...payload } : x));
          } else {
            next.unshift(payload);
          }
          // 确保默认地址唯一
          if (payload.isDefault) {
            next = next.map(x => ({ ...x, isDefault: x.id === payload.id }));
          } else if (!next.some(x => x.isDefault)) {
            next[0].isDefault = true;
          }
          this.addresses = next;
          this.persistAddresses();
          this.syncOrderWithDefaultAddress();
          this.toast('已保存');
          this.view = 'addressManage';
        },
        get comboSelectCount() {
          return this.comboSelectItems.filter(i => i.selected).reduce((s, i) => s + i.qty, 0);
        },
        get filteredCoupons() {

        },
        get comboSelectMallTotal() {
          return this.comboSelectItems.filter(i => i.selected).reduce((s, i) => s + i.price * i.qty, 0);
        },
        get comboSelectReimburse() {
          return this.comboSelectMallTotal;
        },
        get comboSelectPayable() {
          return Math.max(0, this.comboSelectMallTotal - this.comboSelectReimburse);
        },
        /** 选购页底部「合计」：与列表单价一致（已激活用权益价，否则原价） */
        get comboSelectFooterTotal() {
          return this.comboSelectItems.reduce((sum, row) => {
            const qty = Number(row.qty) || 1;
            const unit = this.drugCardActivated ? this.drugUnitPrice(row) : Number(row.price || 0);

          this.topicSubKey = (topic && Array.isArray(topic.subTabs) && topic.subTabs.length) ? topic.subTabs[0].key : '';

        topicSectionItems(topic, key) {
          const t = topic || this.activeTopicSection;
          if (!t) return [];
          const map = t.itemsBySubKey || {};
          if (key && Array.isArray(map[key])) return map[key];
          return Array.isArray(t.items) ? t.items : [];
        },
        topicItemsForActive() {
          const t = this.activeTopicSection;
          if (!t) return [];
          if (Array.isArray(t.subTabs) && t.subTabs.length) {
            const k = this.topicSubKey || t.subTabs[0].key;
            const map = t.itemsBySubKey || {};
            return Array.isArray(map[k]) ? map[k] : (t.items || []);
          }
          return t.items || [];
        },
        topicAllItems(topic) {
          const t = topic || this.activeTopicSection;
          if (!t) return [];
          if (Array.isArray(t.items) && t.items.length) return t.items;
          const map = t.itemsBySubKey || {};
          const out = [];
          const seen = new Set();
          Object.keys(map).forEach(k => {
            const arr = map[k];
            if (!Array.isArray(arr)) return;
            arr.forEach(it => {
              const key = String(it?.drugId || it?.name || '') + '|' + String(it?.originalPrice ?? it?.price ?? it?.salePrice ?? '');
              if (!key || seen.has(key)) return;
              seen.add(key);
              out.push(it);
            });
          });
          return out;
        },

          this.topicSubKey = '';

        cancelPendingOrderToClosed(orderId) {
          const o = this.orders.find(x => x.id === orderId);
          if (!o || o.status !== 'pending_payment') return;
          o.status = 'closed';
          o.shippingText = '订单已关闭 · 未支付';
          o.hasRx = o.items && o.items.some(it => (it.drugKind || 'otc') === 'rx');
          if (this.activeOrder && this.activeOrder.id === orderId) this.activeOrder = o;

        findCatalogDrug(drugId) {
          return [...this.drugsCold, ...this.drugsChild].find(d => d.id === drugId);

        reorderOneLineFromOrder(it) {
          this.reorderLineToCart(it);
          this.view = 'main';
          this.tab = 'cart';
          this.cartStep = 1;
        },
        reorderLineToCart(it, silent) {
          const qty = Math.max(1, Number(it.qty) || 1);
          const drugId = it.drugId;
          const catalog = drugId ? this.findCatalogDrug(drugId) : null;
          if (catalog) {
            for (let i = 0; i < qty; i++) this.addToCart(catalog, { silent: true });
            if (!silent) this.toast('已加入购物车');
            return;
          }
          const basePrice = Number(it.basePrice ?? it.unitPrice ?? (it.subtotal / Math.max(1, it.qty)) ?? 0);
          const unit = this.drugCardActivated ? basePrice * this.equityDiscount : basePrice;
          const saving = this.drugCardActivated ? basePrice * (1 - this.equityDiscount) : 0;
          this.cartItems.push({
            id: 're-' + Date.now() + '-' + Math.random().toString(36).slice(2),
            type: 'drug',
            drugKind: it.drugKind || 'otc',
            name: it.name,
            thumb: it.thumb || '',
            basePrice,
            price: unit,
            subsidy: saving,
            qty,
            checked: true,
            spec: it.spec || '',
            effect: it.effect || '',
            usage: it.usage || '',
            expiry: it.expiry || '24个月',
            taboo: it.taboo || '',
            sold: it.sold || '热销'
          });
          if (!silent) this.toast('已加入购物车');
        },
        orderStatusPill(status) {
          if (status === 'pending_payment') return { txt: '等待付款 29分58秒', cls: 'bg-brand-50 text-brand-700 border border-brand-200' };
          if (status === 'paid') return { txt: '待发货', cls: 'bg-amber-50 text-amber-800 border border-amber-200' };
          if (status === 'waiting_receipt') return { txt: '待收货', cls: 'bg-orange-50 text-orange-700 border border-orange-200' };
          if (status === 'closed') return { txt: '订单取消', cls: 'bg-slate-100 text-slate-600 border border-slate-200' };
          return { txt: '已完成', cls: 'bg-slate-50 text-slate-700 border border-slate-200' };
        },

          if (s === 'all') return this.orders.slice();
          return this.orders.filter(o => o.status === s);

        payOrder(orderId) {

        cartItemUnitPrice(item) {

          if (item && isDrugLike) {

        cartItemUnitSubsidy(item) {

          if (item && isDrugLike) {

        initEquityActivatePage() {
          // 初始化激活表单（根据登录态）

            if (this.loggedIn) {
              const p = String(this.loginPhone || '').trim();
              if (/^1\d{10}$/.test(p)) this.equityFormPhone = p;
            } else {
              const p = String(this.equityFormPhone || '').trim() || String(this.loginPhone || '').trim();
              if (/^1\d{10}$/.test(p)) this.equityFormPhone = p;
            }
          } catch (e) {}
          // 已登录且已有权益卡：默认收起表单
          this.equityActivateFormOpen = !(this.loggedIn && Array.isArray(this.equityCards) && this.equityCards.length > 0);

          // 预填演示数据（仅在空值时填充，避免覆盖手动输入）
          if (!String(this.equityFormCardNo || '').trim()) this.equityFormCardNo = 'YHT2026000001';

        activateCard() {
          const cardNo = String(this.equityFormCardNo || '').trim();
          const cardPwd = String(this.equityFormCardPwd || '').trim();
          const holderName = String(this.equityFormHolderName || '').trim();
          const idType = String(this.equityFormIdType || '').trim();
          const idNo = String(this.equityFormIdNo || '').trim();
          const phone = this.loggedIn ? String(this.loginPhone || '').trim() : String(this.equityFormPhone || '').trim();
          const sms = String(this.equityFormSmsCode || '').trim();
          let regMeta = null;

          if (!cardNo) { this.toast('请输入卡号'); return; }
          if (!cardPwd) { this.toast('请输入卡密'); return; }
          if (!holderName) { this.toast('请输入姓名'); return; }
          if (!idType) { this.toast('请选择证件类型'); return; }
          if (!idNo) { this.toast('请输入证件号码'); return; }
          if (!this.loggedIn) {
            if (!/^1\d{10}$/.test(phone)) { this.toast('请输入正确手机号'); return; }
            if (sms !== '123456') { this.toast('验证码错误'); return; }
          }
          if (!this.cardAgree) { this.toast('请先阅读并勾选协议'); return; }

          // 模拟后端校验（演示）
          try {
            const rawReg = window.localStorage?.getItem('equityCardRegistry') || '';
            const reg = rawReg ? JSON.parse(rawReg) : {};
            const existing = reg && typeof reg === 'object' ? reg[cardNo] : null;
            regMeta = existing && typeof existing === 'object' ? existing : null;

            // 简单卡密校验：演示环境允许 888888 / 123456 / 或 >=6 位
            if (!(cardPwd === '888888' || cardPwd === '123456' || cardPwd.length >= 6)) {
              this.toast('密码错误');
              return;
            }
            if (existing && existing.phone && String(existing.phone) !== phone) {
              this.toast('卡已激活');
              return;
            }
            if (existing && existing.idType && existing.idNo) {
              if (String(existing.idType) !== idType || String(existing.idNo) !== idNo) {
                this.toast('证件不匹配');
                return;
              }
            }
            // 绑定：写入手机号，但保留卡的元信息（有效期/名称）
            reg[cardNo] = { ...(existing && typeof existing === 'object' ? existing : {}), phone, idType, idNo };
            window.localStorage?.setItem('equityCardRegistry', JSON.stringify(reg));
          } catch (e) {}

          // 未登录激活：自动注册 + 自动登录
          if (!this.loggedIn) {
            this.loggedIn = true;
            this.loginPhone = phone;
            this.userMask = phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
            try { window.localStorage?.setItem('lastLoginPhone', phone); } catch (e) {}
          }

          // 绑定权益卡（可多张）
          const cardMask = cardNo.length >= 6 ? (cardNo.slice(0, 2) + '****' + cardNo.slice(-4)) : cardNo;
          if (!Array.isArray(this.equityCards)) this.equityCards = [];
          const existed = this.equityCards.find(c => {
            // 新逻辑：只要本次是“完整卡号”，优先且仅用 cardNo 判重，避免 cardNoMasked 冲突误判
            if (cardNo) return String(c?.cardNo || '') === cardNo;
            // 兜底：历史数据没有 cardNo 时才用 masked
            return String(c?.cardNoMasked || '') === cardMask;
          });
          if (!existed) {
            const nowId = 'ec_' + Date.now().toString(16) + '_' + Math.random().toString(16).slice(2, 8);
            const startAt = (regMeta && regMeta.startAt) ? String(regMeta.startAt) : (this.todayYMD ? this.todayYMD() : '2026-01-01');
            const expireAt = (regMeta && regMeta.expireAt) ? String(regMeta.expireAt) : '2026-12-31';
            const name = (regMeta && regMeta.name) ? String(regMeta.name) : '华润e•药惠通2026';
            const newCard = {
              id: nowId,
              name,
              discount: '7折',
              holderName,
              idType,
              idNo,
              cardNo,
              cardNoMasked: cardMask,
              savedAmount: 100.99,
              startAt,
              expireAt
            };
            this.equityCards = [newCard, ...this.equityCards];
            this.activeEquityCardId = String(newCard.id);
          } else {
            this.activeEquityCardId = String(existed.id || '');
          }

          this.saveEquityCardsForPhone(phone);
          this.syncEquityActivatedFlag();

          // 激活成功：弹窗提示，点击“知道了”后停留在激活页
          this.equityQuotaRemaining = this.equityQuotaTotal;
          try { window.localStorage?.setItem('equityQuotaRemaining', String(this.equityQuotaRemaining)); } catch (e) {}
          this.showDiscountDetail = false;
          // 激活成功后进入“默认已激活”展示态：隐藏表单 + 底部显示返回首页
          this.equityActivateFormOpen = false;
          this.activateSuccessModal = true;

            phoneDisplay: masked,
            idCard: idc,
            health: (this.rxNewHealth || '').trim() || '无特殊说明'
          });
          this.rxSelectedPatientId = id;
          this.view = this.rxAddPatientFrom === 'picker' ? 'rxPatientSelect' : 'rxCheckout';
          this.toast('已保存用药人');
        },
        buyNowFromDetail() { this.openAddToCartSheet(this.detailDrug, 'buyNow'); },
        buyRxFromDetail() { this.openAddToCartSheet(this.detailDrug, 'buyRx'); },
        goCartStep2() {
          if (this.selectedCount === 0) return;
          if (this.selectedHasRx && !this.rxPrescriptionComplete) {
            this.rxCheckoutStep = 1;
            this.rxAgreementChecked = true;
            this.view = 'rxCheckout';
            return;
          }
          this.cartStep = 2;
          this.syncOrderWithDefaultAddress();
        },
        completePay() {
          this.toast('支付成功（演示）');
          this.cartItems = this.cartItems.filter(i => !i.checked);
          this.cartStep = 1;
          this.rxPrescriptionComplete = false;
          this.rxDiseaseByItemId = {};
          // 演示：首单支付完成后固定额度用完，仅剩权益折扣
          if (this.loggedIn && this.drugCardActivated && this.equityQuotaRemaining > 0) {
            this.equityQuotaRemaining = 0;
            try { window.localStorage?.setItem('equityQuotaRemaining', '0'); } catch (e) {}
          }
          this.comboCheckoutMode = false;
          this.comboCheckoutTempItemId = '';
          this.tab = 'profile';
        }
      };
    }
  </script>
</body>
</html>
