<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>购药云商城</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#ecfdf5', 500: '#10b981', 600: '#059669', 700: '#047857' }
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .safe-pb { padding-bottom: env(safe-area-inset-bottom, 0px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased" x-data="mallApp()" x-cloak>
  <div class="mx-auto max-w-md min-h-screen bg-white shadow-xl relative pb-24 safe-pb"
       x-init="setInterval(() => { if (view === 'main' && tab === 'home' && !detailPage) bannerIdx = (bannerIdx + 1) % banners.length }, 3500)">

    <!-- ========== 组合购药：列表页 ========== -->
    <template x-if="view === 'comboList'">
      <div class="fixed inset-0 z-[58] bg-gray-100 flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-white border-b border-slate-100">
          <button type="button" @click="view = 'main'" class="p-2 -ml-1 rounded-xl text-slate-700 text-lg" aria-label="返回">←</button>
          <h1 class="font-bold text-lg text-slate-900 flex-1 text-center pr-8">组合购药</h1>
        </header>
        <div class="shrink-0 bg-gradient-to-r from-orange-500 to-amber-500 text-white px-4 py-4">
          <p class="text-base font-bold leading-snug">组合购药理赔限额内 <span class="text-yellow-200">0元</span></p>
          <p class="text-xs opacity-95 mt-1">在线问诊+药品费用直赔+送药到家</p>
        </div>
        <div class="flex-1 overflow-y-auto px-3 py-3 pb-28 safe-pb space-y-3">
          <template x-for="b in comboPurchaseBundles" :key="b.id">
            <div class="bg-white rounded-xl shadow-sm p-3 border border-slate-100/80">
              <div class="flex gap-3">
                <div class="w-24 h-24 shrink-0 rounded-lg bg-slate-100 flex items-center justify-center text-3xl text-slate-400"><i class="ri-image-line"></i></div>
                <div class="flex-1 min-w-0">
                  <p class="font-bold text-slate-900 text-sm" x-text="b.title"></p>
                  <div class="mt-1 space-y-0.5 text-[10px] text-gray-500 leading-relaxed max-h-20 overflow-hidden">
                    <template x-for="(line, li) in b.lines" :key="li">
                      <p class="line-clamp-1" x-text="line"></p>
                    </template>
                  </div>
                  <div class="flex flex-wrap gap-1 mt-2">
                    <template x-for="(tg, ti) in b.tags" :key="ti">
                      <span class="text-[10px] px-2 py-0.5 rounded-full bg-orange-50 text-orange-600" x-text="tg"></span>
                    </template>
                  </div>
                </div>
              </div>
              <div class="flex justify-end mt-3">
                <button type="button" @click="openComboBundleDetail(b, 'list')" class="bg-orange-500 text-white rounded-full px-6 py-2 text-sm font-medium shadow-sm active:opacity-90">去购买</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- ========== 组合购药：单包详情 ========== -->
    <template x-if="view === 'comboDetail' && comboActiveBundle">
      <div class="fixed inset-0 z-[58] bg-gray-100 flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-white border-b border-slate-100">
          <button type="button" @click="closeComboDetail()" class="p-2 -ml-1 rounded-xl text-slate-700 text-lg">←</button>
          <h1 class="font-bold text-lg text-slate-900 flex-1 text-center pr-8">组合购药</h1>
        </header>
        <div class="shrink-0 bg-gradient-to-r from-orange-500 to-amber-500 text-white px-4 py-3">
          <p class="text-sm font-bold">理赔限额内 0元购 · 直赔到家</p>
          <p class="text-[11px] opacity-90 mt-0.5" x-text="comboActiveBundle.title"></p>
        </div>
        <div class="flex-1 overflow-y-auto px-3 py-4 pb-40 safe-pb">
          <div class="bg-white rounded-xl shadow-sm p-4 border border-slate-100">
            <div class="flex gap-3">
              <div class="w-28 h-28 shrink-0 rounded-xl bg-slate-100 flex items-center justify-center text-4xl text-slate-400"><i class="ri-image-line"></i></div>
              <div class="flex-1 min-w-0">
                <p class="font-bold text-slate-900" x-text="comboActiveBundle.title"></p>
                <p class="text-xs text-slate-500 mt-2">本组合包含以下药品（规格与数量以实际处方为准，演示数据）：</p>
              </div>
            </div>
            <ul class="mt-4 space-y-2 text-xs text-gray-600 border-t border-slate-100 pt-3">
              <template x-for="(line, li) in comboActiveBundle.lines" :key="li">
                <li class="flex gap-2"><span class="text-orange-400 shrink-0">·</span><span x-text="line"></span></li>
              </template>
            </ul>
            <div class="flex flex-wrap gap-1.5 mt-4">
              <template x-for="(tg, ti) in comboActiveBundle.tags" :key="ti">
                <span class="text-xs px-2 py-1 rounded-full bg-orange-50 text-orange-600 border border-orange-100" x-text="tg"></span>
              </template>
            </div>
          </div>
          <p class="text-center text-[11px] text-slate-400 mt-4 px-2">以下药品在选购页支持勾选与改量，结算时按权益直赔规则计算（演示）。</p>
        </div>
        <div class="fixed bottom-14 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 px-4 py-3 safe-pb z-[61] flex gap-3 shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">
          <button type="button" @click="showService = true" class="px-3 py-2 rounded-xl border border-slate-200 text-sm text-slate-600">客服</button>
          <button type="button" @click="openComboSelect()" class="flex-1 py-3 rounded-full bg-orange-500 text-white text-sm font-bold">去购买</button>
        </div>
      </div>
    </template>

    <!-- ========== 组合购药：选购药品（加入购物车） ========== -->
    <template x-if="view === 'comboSelect' && comboActiveBundle">
      <div class="fixed inset-0 z-[58] bg-white flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center justify-between px-3 py-3 border-b border-slate-100 bg-white">
          <button type="button" @click="view = 'comboDetail'" class="p-2 -ml-1 text-slate-600 text-lg" aria-label="关闭">✕</button>
          <h1 class="font-semibold text-base text-slate-900">选购药品</h1>
          <span class="w-9 text-center text-slate-400">⋯</span>
        </header>
        <div class="shrink-0 px-4 py-2 bg-slate-50 border-b border-slate-100 text-xs text-slate-600">
          <p>已选：<span class="text-brand-600 font-medium" x-text="comboActiveBundle.title"></span></p>
          <p class="text-slate-400 mt-1">以下药品均可直接报销（演示）</p>
        </div>
        <div class="flex-1 overflow-y-auto pb-40">
          <template x-for="row in comboSelectItems" :key="row.id">
            <div class="flex items-stretch gap-2 px-3 py-3 border-b border-slate-50">
              <label class="flex items-center pt-1 shrink-0 cursor-pointer">
                <input type="checkbox" x-model="row.selected" class="rounded-full border-slate-300 text-teal-500 w-5 h-5 focus:ring-teal-500" />
              </label>
              <div class="w-16 h-16 shrink-0 rounded-lg bg-slate-100 flex items-center justify-center text-2xl text-slate-400"><i class="ri-image-line"></i></div>
              <div class="flex-1 min-w-0 flex flex-col justify-between py-0.5">
                <p class="text-sm font-semibold text-slate-900 line-clamp-2" x-text="row.name"></p>
                <p class="text-xs text-slate-500 mt-0.5" x-text="row.spec"></p>
                <p class="text-sm font-bold text-slate-900 mt-1">
                  <template x-if="drugCardActivated">
                    <span>
                      ¥<span x-text="drugUnitPrice(row).toFixed(2)"></span>
                      <span class="text-[10px] font-semibold text-orange-600 bg-orange-50 border border-orange-100 px-1.5 py-0.5 rounded-md ml-1">权益价</span>
                    </span>
                  </template>
                  <template x-if="!drugCardActivated">
                    <span>¥<span x-text="row.price.toFixed(2)"></span></span>
                  </template>
                </p>
              </div>
              <div class="flex flex-col items-end justify-center shrink-0">
                <template x-if="!row.selected">
                  <button type="button" @click="row.selected = true; row.qty = 1" class="w-8 h-8 rounded-full bg-orange-500 text-white text-lg font-bold leading-none flex items-center justify-center">+</button>
                </template>
                <template x-if="row.selected">
                  <div class="flex items-center gap-2 border border-slate-200 rounded-lg overflow-hidden">
                    <button type="button" @click="row.qty = Math.max(1, row.qty - 1)" class="px-2 py-1 text-slate-600">−</button>
                    <span class="w-6 text-center text-sm" x-text="row.qty"></span>
                    <button type="button" @click="row.qty++" class="px-2 py-1 text-slate-600">+</button>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
        <div class="shrink-0 px-3 py-2 bg-orange-50 border-t border-orange-100 flex items-center gap-2 text-xs text-orange-800">
          <span><i class="ri-fire-line"></i></span>
          <span>再加购 <b>108</b> 元药品，自费支付 <b>0</b> 元（演示进度）</span>
        </div>
        <div class="fixed bottom-14 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 px-3 py-3 safe-pb z-[61] shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">
          <div class="flex items-center gap-3 mb-2">
            <label class="flex items-center gap-2 text-sm text-slate-700 shrink-0 cursor-pointer">
              <input type="checkbox" :checked="comboSelectAllChecked" @change="toggleComboSelectAll($event.target.checked)" class="rounded border-slate-300 text-teal-500" />
              全选
            </label>
            <div class="flex-1 text-right text-xs">
              <p>已选 <span class="font-semibold text-slate-900" x-text="comboSelectCount"></span> 件，合计 <span class="text-red-600 font-bold">¥<span x-text="comboSelectPayable.toFixed(2)"></span></span></p>
              <p class="text-slate-500 mt-0.5">门诊报销：¥<span class="text-orange-600 font-semibold" x-text="comboSelectReimburse.toFixed(2)"></span> <span class="text-slate-400">明细^</span></p>
            </div>
            <button type="button" @click="comboBuyNow()" :disabled="comboSelectCount === 0" class="shrink-0 rounded-full bg-orange-500 text-white px-4 py-2.5 text-sm font-bold disabled:opacity-40">立即购药</button>
          </div>
        </div>
      </div>
    </template>

    <!-- ========== 搜索页（参考图样式） ========== -->
    <template x-if="view === 'search'">
      <div class="fixed inset-0 z-[58] bg-[#f2f2f2] max-w-md mx-auto left-0 right-0 flex flex-col">
        <header class="bg-gradient-to-r from-indigo-500 to-indigo-600 text-white">
          <div class="h-14 px-3 flex items-center justify-between">
            <button type="button" @click="closeSearch()" class="w-8 h-8 flex items-center justify-center text-2xl text-white/90">
              <i class="ri-arrow-left-s-line"></i>
            </button>
            <h1 class="text-lg font-semibold tracking-wide">搜索</h1>
            <div class="h-8 px-2 rounded-full bg-indigo-700/45 border border-white/20 flex items-center gap-2 text-white/90">
              <i class="ri-more-fill text-sm"></i>
              <i class="ri-focus-3-line text-base"></i>
            </div>
          </div>
        </header>

        <div class="flex-1 overflow-y-auto px-3 py-4 pb-24 space-y-5 safe-pb">
          <div class="flex items-center gap-2">
            <div class="flex-1 rounded-full border-2 border-orange-500 bg-white pl-4 pr-1 py-1 flex items-center gap-2">
              <i class="ri-search-line text-[22px] leading-none text-orange-500"></i>
              <input type="search"
                     x-model="searchKeyword"
                     @keydown.enter="submitSearch()"
                     placeholder="牛奶"
                     class="flex-1 bg-transparent text-lg text-slate-700 placeholder:text-slate-400 outline-none" />
              <button type="button" @click="submitSearch()" class="px-7 py-2 rounded-full bg-orange-500 text-white text-base font-medium">搜索</button>
            </div>
            <button type="button" @click="closeSearch()" class="text-lg text-slate-700">取消</button>
          </div>

          <div>
            <div class="flex items-center justify-between mb-3">
              <div class="text-2xl leading-none font-semibold text-slate-500">搜索历史</div>
              <button type="button" @click="searchHistory = []" class="text-slate-400 text-2xl">
                <i class="ri-delete-bin-7-line"></i>
              </button>
            </div>
            <div class="flex flex-wrap gap-3">
              <template x-for="h in searchHistory" :key="h">
                <button type="button" @click="selectSearchKeyword(h)" class="px-4 py-2 rounded-full bg-[#e5e5e5] text-base text-slate-700" x-text="h"></button>
              </template>
            </div>
          </div>

          <div>
            <div class="text-2xl leading-none font-semibold text-slate-500 mb-3">猜你想搜</div>
            <div class="flex flex-wrap gap-3">
              <template x-for="k in searchSuggests" :key="k">
                <button type="button" @click="selectSearchKeyword(k)" class="px-4 py-2 rounded-full bg-[#f6ede8] text-base text-orange-500" x-text="k"></button>
              </template>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2" x-show="searchHasSearched && searchResults.length">
            <template x-for="d in searchResults" :key="d.id + '-search'">
              <div class="rounded-xl border border-slate-100 bg-white overflow-hidden shadow-sm flex flex-col">
                <button type="button" @click="openDrug(d)" aria-label="查看商品详情" class="aspect-square bg-slate-100 overflow-hidden w-full">
                  <img :src="d.thumb" alt="" class="w-full h-full object-cover pointer-events-none" />
                </button>
                <div class="p-2 flex-1 flex flex-col">
                  <p class="text-[9px] text-slate-500">
                    <span class="px-1 py-0.5 rounded border" :class="(d.drugKind || 'otc') === 'rx' ? 'border-amber-300 bg-amber-50 text-amber-800' : 'border-slate-200 bg-slate-50 text-slate-600'" x-text="(d.drugKind || 'otc') === 'rx' ? '处方药' : '非处方药'"></span>
                  </p>
                  <button type="button" @click="openDrug(d)" class="text-left w-full mt-1 min-h-[2rem] rounded-md -mx-0.5 px-0.5 py-0.5 text-[10px] text-slate-700 leading-tight hover:text-brand-600 active:bg-slate-50 transition-colors">
                    <span class="line-clamp-2 block" x-text="d.name"></span>
                  </button>
                  <div class="mt-1">
                    <template x-if="!drugShowEquity">
                      <div class="leading-tight">
                        <p class="text-red-600 font-bold text-sm">¥<span x-text="drugOriginalPrice(d).toFixed(2)"></span><span class="text-[10px] ml-0.5">原价</span></p>
                        <p class="text-red-500 text-xs mt-0.5">¥?<span class="text-[10px] ml-0.5">权益价</span></p>
                      </div>
                    </template>
                    <template x-if="drugShowEquity">
                      <div class="leading-tight">
                        <div class="mt-0.5 inline-flex flex-col border-2 border-lime-500/80 bg-lime-50/50 rounded-md px-2.5 py-1">
                          <div class="flex items-center gap-2">
                            <span class="text-red-600 font-bold text-sm leading-none">¥<span x-text="drugEquityPrice(d).toFixed(2)"></span></span>
                            <span class="text-[10px] font-semibold text-red-600 border border-red-100 bg-red-50 px-1.5 py-0.5 rounded">补贴价</span>
                            <span class="text-[10px] font-semibold text-red-600 border border-red-100 bg-red-50 px-1.5 py-0.5 rounded">
                              已补贴¥<span x-text="drugSavedAmount(d).toFixed(2)"></span>
                            </span>
                          </div>
                          <p class="text-[10px] text-slate-400 mt-1">原价¥<span x-text="drugOriginalPrice(d).toFixed(2)"></span></p>
                        </div>
                      </div>
                    </template>
                  </div>
                  <button type="button" @click.stop="addToCart(d)" class="mt-2 py-1.5 rounded-full bg-red-500 text-white text-[10px] font-semibold w-full">立即抢购 ></button>
                </div>
              </div>
            </template>
          </div>

          <div x-show="searchHasSearched && !searchResults.length" class="text-center text-xs text-slate-400 py-10">暂无匹配药品</div>
        </div>
      </div>
    </template>

    <!-- ========== 登录页（参考荷叶健康：绿色主色 + 协议） ========== -->
    <template x-if="view === 'login'">
      <div class="fixed inset-0 z-[60] bg-white flex flex-col max-w-md mx-auto left-0 right-0">
        <div class="px-6 pt-14 pb-4">
          <div class="flex items-center gap-3 mb-8">
            <div class="w-14 h-14 rounded-full bg-[#07C160] flex items-center justify-center text-white text-xl font-bold shadow-md shadow-green-500/25">荷</div>
            <div>
              <h1 class="text-xl font-bold text-[#07C160] leading-tight">购药云商城</h1>
              <p class="text-[10px] text-[#07C160]/80 font-medium tracking-widest mt-0.5">CLOUD PHARMACY</p>
            </div>
          </div>
          <p class="text-base font-medium text-slate-900">登录后开发者将获得以下权限</p>
          <p class="text-sm text-slate-500 mt-2 leading-relaxed">获得你的公开信息（昵称、头像等）</p>
        </div>

        <div class="px-6 flex-1 flex flex-col">
          <button type="button" @click="oneClickLogin()" class="w-full py-3.5 rounded-full bg-[#07C160] text-white text-base font-semibold shadow-md shadow-green-600/20 active:opacity-95">一键登录</button>

          <p class="text-center text-xs text-slate-400 my-4">— 手机验证码登录 / 注册 —</p>

          <div class="space-y-4">
            <div>
              <label class="text-xs text-slate-500">手机号</label>
              <input type="tel" maxlength="11" x-model="loginPhone" placeholder="请输入手机号" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3.5 text-base outline-none focus:ring-2 focus:ring-[#07C160]/25 focus:border-[#07C160]" />
            </div>
            <div>
              <label class="text-xs text-slate-500">验证码</label>
              <div class="mt-1 flex gap-2">
                <input type="text" maxlength="6" x-model="loginCode" placeholder="请输入验证码" class="flex-1 rounded-2xl border border-slate-200 px-4 py-3.5 text-base outline-none focus:ring-2 focus:ring-[#07C160]/25 focus:border-[#07C160]" />
                <button type="button" @click="sendCode()" :disabled="codeCountdown > 0" class="shrink-0 px-4 rounded-2xl bg-slate-100 text-[#07C160] font-medium text-sm disabled:opacity-50" x-text="codeCountdown > 0 ? codeCountdown + 's' : '获取验证码'"></button>
              </div>
            </div>
            <p class="text-[11px] text-slate-400">已默认填写演示账号：<span class="text-slate-600">13999998888</span>，验证码 <span class="text-slate-600">123456</span></p>
          </div>

          <button type="button" @click="doLogin()" class="w-full mt-6 py-3.5 rounded-full border-2 border-slate-200 text-slate-800 font-semibold text-base hover:border-[#07C160]/40 hover:text-[#07C160] transition-colors">验证并登录</button>

          <button type="button" @click="skipLoginForNow()" class="w-full mt-4 text-sm text-slate-400 py-2">暂不登录 / 注册</button>

          <div class="flex-1"></div>

          <button type="button" @click="view = 'cardActivate'; activatePhone = loginPhone" class="w-full mb-3 py-3 rounded-2xl border border-[#07C160]/30 text-[#07C160] font-medium text-sm">我有药诊卡，去激活</button>

          <label class="flex items-start gap-2 pb-8 safe-pb cursor-pointer">
            <input type="checkbox" x-model="loginAgree" class="mt-0.5 rounded border-slate-300 text-[#07C160] focus:ring-[#07C160]" />
            <span class="text-[11px] text-slate-500 leading-relaxed">我已阅读并同意<span class="text-[#07C160]">《用户服务协议》</span>、<span class="text-[#07C160]">《隐私政策》</span>、<span class="text-[#07C160]">《法律声明》</span></span>
          </label>
        </div>
      </div>
    </template>

    <!-- ========== 我的订单：列表页 ========== -->
    <template x-if="view === 'ordersList'">
      <div class="fixed inset-0 z-[56] bg-gray-50 flex flex-col max-w-md mx-auto left-0 right-0">
        <header class="shrink-0 flex items-center gap-2 px-3 py-3 bg-white border-b border-slate-100">
          <button type="button" @click="backToProfile()" class="p-2 -ml-1 rounded-xl text-slate-700 text-lg" aria-label="返回">←</button>
          <h1 class="font-bold text-lg text-slate-900 flex-1 text-center pr-8">我的订单</h1>
        </header>
        <div class="shrink-0 px-3 py-3 bg-white border-b border-slate-100">
          <div class="flex gap-2">
            <button type="button" @click="ordersStatus = 'pending_payment'" class="flex-1 py-2 rounded-full text-sm font-semibold border" :class="ordersStatus === 'pending_payment' ? 'bg-brand-600 text-white border-brand-600' : 'bg-white text-slate-600 border-slate-200'">待支付</button>
            <button type="button" @click="ordersStatus = 'paid'" class="flex-1 py-2 rounded-full text-sm font-semibold border" :class="ordersStatus === 'paid' ? 'bg-brand-600 text-white border-brand-600' : 'bg-white text-slate-600 border-slate-200'">已支付</button>

          const qty = Math.max(1, Number(it.qty) || 1);

          const catalog = drugId ? this.findCatalogDrug(drugId) : null;
          if (catalog) {

            if (!silent) this.toast('已加入购物车');
            return;

          const basePrice = Number(it.basePrice ?? it.unitPrice ?? (it.subtotal / Math.max(1, it.qty)) ?? 0);
          const unit = this.drugCardActivated ? basePrice * this.equityDiscount : basePrice;
          const saving = this.drugCardActivated ? basePrice * (1 - this.equityDiscount) : 0;
          this.cartItems.push({
            id: 're-' + Date.now() + '-' + Math.random().toString(36).slice(2),
            type: 'drug',
            drugKind: it.drugKind || 'otc',
            name: it.name,
            thumb: it.thumb || '',
            basePrice,
            price: unit,
            subsidy: saving,
            qty,
            checked: true,
            spec: it.spec || '',
            effect: it.effect || '',
            usage: it.usage || '',
            expiry: it.expiry || '24个月',
            taboo: it.taboo || '',

            key: 'b', title: '医疗权益卡B（钻石）', bannerText: '钻石购药卡',
            intro: '更高折扣档位，适合用药频次高的用户。',
            discount: '购药6折，999元/年',
            benefits: ['购药6折（规则内品类）', '慢病管理资讯', '优先审方（示意）'],
            crowd: '高频购药用户、多成员家庭',
            highlights: '折扣力度更高，长期更省。',
            faq: '不与部分特价叠加时使用规则详见说明。',
            sold: '1,890', left: '110', price: 999
          };
          this.detailEquity = data;
          this.detailPage = 'equity';
        },
        openDrug(d) {
          this.detailDrug = { ...d, drugKind: d.drugKind || 'otc' };
          this.detailPage = 'drug';
        },
        openCombo(pack) {
          this.detailCombo = { ...pack };
          this.detailPage = 'combo';
        },
        addComboToCart() {
          if (!this.detailCombo) return;
          const p = this.detailCombo;
          const item = {
            id: 'combo-' + p.id,
            name: p.title,
            price: p.price,
            subsidy: 0,
            qty: 1,
            checked: true,
            effect: p.detail,
            usage: '按组合说明',
            expiry: '见包装',
            taboo: '遵医嘱',
            spec: '组合包',
            sold: '热售'
          };
          this.addToCart(item);
          this.closeDetail();
        },
        closeDetail() {
          this.detailPage = '';
          this.detailEquity = null;
          this.detailDrug = null;
          this.detailCombo = null;
        },
        addToCart(d, opts) {
          const silent = opts && opts.silent;
          // 未登录：禁止把“药品”加入购物车（演示规则）
          if (d && d.type === 'drug' && !this.loggedIn) {
            this.pendingAction = 'addToCartDrug';
            this.pendingAddToCartDrug = d;
            // 进入登录页后避免详情弹层“带着状态”返回
            this.closeDetail();
            this.view = 'login';
            this.toast('请先登录后再加购');
            return;
          }

          // 若为药品：根据是否激活药诊卡，写入实际单价与优惠金额
          if (d && d.type === 'drug') {
            const conflicts = d.rxConflictWithIds || [];
            for (let j = 0; j < conflicts.length; j++) {
              const oid = conflicts[j];
              const other = this.cartItems.find(i => i.id === oid);
              if (other) {
                this.toast('您加购的「' + d.name + '」与您购物车内「' + other.name + '」不宜同时使用哦~');
                return;
              }
            }
            const basePrice = Number(d.price || 0);
            const unit = this.drugCardActivated ? basePrice * this.equityDiscount : basePrice;
            const saving = this.drugCardActivated ? basePrice * (1 - this.equityDiscount) : 0;
            const ex = this.cartItems.find(i => i.id === d.id);
            if (ex) {
              ex.qty++;
              ex.type = 'drug';
              ex.basePrice = Number(ex.basePrice ?? basePrice);
              ex.price = unit;
              ex.subsidy = saving;
            } else {
              this.cartItems.push({ ...d, type: 'drug', basePrice, qty: 1, checked: true, price: unit, subsidy: saving });
            }
            if (!silent) this.toast('已加入购物车');
            return;
          }

          const ex = this.cartItems.find(i => i.id === d.id);
          if (ex) ex.qty++;
          else this.cartItems.push({ ...d, qty: 1, checked: true });
          if (!silent) this.toast('已加入购物车');
        },
        addEquityToCart() {
          if (!this.detailEquity) return;
          const id = 'eq-' + this.detailEquity.key;
          const item = {
            id, name: this.detailEquity.title + '（年卡）', price: this.detailEquity.price, subsidy: 0, qty: 1, checked: true,
            effect: '', usage: '', expiry: '365天', taboo: '', spec: '电子卡', sold: this.detailEquity.sold
          };
          this.addToCart(item);
          this.closeDetail();
        },
        removeCart(id) {
          this.cartItems = this.cartItems.filter(i => i.id !== id);
        },

        get allChecked() {
          return this.cartItems.length > 0 && this.cartItems.every(i => i.checked);
        },
        toggleAll(v) {
          this.cartItems.forEach(i => { i.checked = v; });
        },
        get selectedItems() {
          return this.cartItems.filter(i => i.checked);
        },
        get selectedCount() {
          return this.selectedItems.reduce((s, i) => s + i.qty, 0);
        },
        get selectedTotal() {
          return this.selectedItems.reduce((s, i) => {
            const unit = i && i.type === 'drug' ? this.cartItemUnitPrice(i) : Number(i?.price ?? 0);
            return s + unit * i.qty;
          }, 0);
        },
        get selectedSubsidy() {
          return this.selectedItems.reduce((s, i) => {
            const unit = i && i.type === 'drug' ? this.cartItemUnitSubsidy(i) : (Number(i?.subsidy) || 0);
            return s + unit * i.qty;
          }, 0);
        },
        get subsidyTotal() {
          return this.selectedSubsidy;
        },
        get payAmount() {
          // 售价为补贴价；共减仅作展示，应付 = 商品小计 - 演示优惠券
          return Math.max(0, this.selectedTotal - 5);
        },

        closeRxCheckout() {
          this.view = 'main';
          this.tab = 'cart';
          this.cartStep = 1;
          this.rxCheckoutStep = 1;
        },
        openRxPatientSelect() {
          this.view = 'rxPatientSelect';
        },
        openRxAddPatient(from) {
          this.rxAddPatientFrom = from || 'checkout';
          this.rxNewName = '';
          this.rxNewIdCard = '';
          this.rxNewPhone = '';
          this.rxNewHealth = '无过往病史、无过敏史、无肝功异常';
          this.view = 'rxAddPatient';
        },
        closeRxAddPatient() {
          this.view = this.rxAddPatientFrom === 'picker' ? 'rxPatientSelect' : 'rxCheckout';
        },
        pickRxPatient(id) {
          this.rxSelectedPatientId = id;
          this.view = 'rxCheckout';
        },
        setRxDiseaseForItem(itemId, disease) {
          this.rxDiseaseByItemId = { ...this.rxDiseaseByItemId, [itemId]: disease };
        },
        rxConsultTapUpload() {
          if (this.rxUploadCount >= 5) { this.toast('最多上传5张'); return; }
          this.rxUploadCount++;
          this.toast('已添加示意图（演示）');
        },
        startRxConsultation() {
          if (!this.rxSelectedPatientId) { this.toast('请选择用药患者'); return; }
          const miss = this.selectedRxDrugItems.filter(i => !(this.rxDiseaseByItemId[i.id] || '').length);
          if (miss.length) { this.toast('请为每个处方药选择确诊疾病'); return; }
          if (!this.rxAgreementChecked) { this.toast('请阅读并勾选知情同意'); return; }
          this.rxCheckoutStep = 2;
        },
        finishRxCheckout() {
          this.rxPrescriptionComplete = true;
          this.view = 'main';
          this.tab = 'cart';
          this.cartStep = 2;
          this.rxCheckoutStep = 1;
          this.toast('问诊完成，请填写收货地址');
        },
        saveRxNewPatient() {
          const name = (this.rxNewName || '').trim();
          const idc = (this.rxNewIdCard || '').trim();
          const phone = (this.rxNewPhone || '').trim();
          if (!name) { this.toast('请填写真实姓名'); return; }
          if (!/^\d{17}[\dXx]$/.test(idc)) { this.toast('请填写正确身份证号'); return; }
          if (!/^1\d{10}$/.test(phone)) { this.toast('请填写正确手机号'); return; }
          const id = 'p-' + Date.now();
          const masked = phone.slice(0, 3) + '****' + phone.slice(-4);
          let age = 25;
          if (idc.length === 18) {
            const y = parseInt(idc.slice(6, 10), 10);
            const m = parseInt(idc.slice(10, 12), 10) - 1;
            const d = parseInt(idc.slice(12, 14), 10);
            if (!isNaN(y) && !isNaN(m) && !isNaN(d)) {
              const bd = new Date(y, m, d);
              age = Math.max(1, Math.floor((Date.now() - bd.getTime()) / (365.25 * 24 * 3600 * 1000)));
            }
          }
          this.rxPatients.push({
            id,
            name,
            age,
            gender: '女',
            phone,
            phoneDisplay: masked,
            idCard: idc,
            health: (this.rxNewHealth || '').trim() || '无特殊说明'
          });
          this.rxSelectedPatientId = id;
          this.view = this.rxAddPatientFrom === 'picker' ? 'rxPatientSelect' : 'rxCheckout';
          this.toast('已保存用药人');
        },
        buyNowFromDetail() {
          if (!this.detailDrug) return;
          this.addToCart(this.detailDrug);
          this.closeDetail();
          this.tab = 'cart';
          this.cartStep = 1;
          this.toast('已加入购物车');
        },
        buyRxFromDetail() {
          if (!this.detailDrug) return;
          this.addToCart(this.detailDrug);
          this.closeDetail();
          this.tab = 'cart';
          this.cartStep = 1;
          this.toast('已加入购物车，结算时将引导完善处方信息');
        },
        goCartStep2() {
          if (this.selectedCount === 0) return;
          if (this.selectedHasRx && !this.rxPrescriptionComplete) {
            this.rxCheckoutStep = 1;
            this.rxAgreementChecked = true;
            this.view = 'rxCheckout';
            return;
          }
          this.cartStep = 2;
        },
        completePay() {
          this.toast('支付成功（演示）');
          this.cartItems = this.cartItems.filter(i => !i.checked);
          this.cartStep = 1;
          this.rxPrescriptionComplete = false;
          this.rxDiseaseByItemId = {};
          this.tab = 'profile';
        }
      };
    }
  </script>
</body>
</html>
